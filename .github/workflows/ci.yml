name: CI/CD Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test-and-analysis:
    name: Native Linux Testing & Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Python Dependencies
        run: |
          python3 -m pip install openpyxl

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev \
            libgtk-3-dev \
            ccache \
            cppcheck \
            lcov

      - name: Setup Compiler Cache (ccache)
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: linux-gcc-ccache

      - name: Configure CMake (Native Linux)
        env:
          CC: "ccache gcc"
          CXX: "ccache g++"
        run: |
          cmake -B build-linux \
            -DCMAKE_BUILD_TYPE=Release \
            -DTREAT_WARNINGS_AS_ERRORS=ON \
            -DPLATFORM=LINUX

      - name: Build (Native Linux)
        run: |
          cmake --build build-linux --config Release -j$(nproc)

      - name: Run Tests (Native Linux)
        run: |
          cd build-linux
          ctest -T Test --output-on-failure

      - name: Capture and Filter Coverage
        run: |
          lcov --directory build-linux --capture --output-file coverage.info
          lcov --remove coverage.info '/usr/*' '*/thirdparty/*' '*/tests/*' --output-file coverage.info --ignore-errors unused
          lcov --list coverage.info --ignore-errors unused

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.info
          fail_ci_if_error: false

      - name: Run Static Analysis (cppcheck)
        run: |
          cppcheck --enable=warning,style,performance,portability \
            --inline-suppr \
            --std=c++17 \
            --error-exitcode=1 \
            --xml \
            --xml-version=2 \
            src/ tests/ 2> cppcheck_report.xml

      - name: Configure CMake with Sanitizers (ASan/UBSan)
        env:
          CC: "ccache gcc"
          CXX: "ccache g++"
        run: |
          cmake -B build-sanitizers \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_SANITIZERS=ON \
            -DPLATFORM=LINUX

      - name: Build with Sanitizers (ASan/UBSan)
        run: |
          cmake --build build-sanitizers --config Debug -j$(nproc)

      - name: Run Tests with Sanitizers
        env:
          ASAN_OPTIONS: detect_leaks=1
          LSAN_OPTIONS: suppressions=${{ github.workspace }}/tests/lsan.supp
        run: |
          cd build-sanitizers
          ctest -T Test --output-on-failure

      - name: Configure CMake with ThreadSanitizer (TSan)
        env:
          CC: "ccache gcc"
          CXX: "ccache g++"
        run: |
          cmake -B build-tsan \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_TSAN=ON \
            -DPLATFORM=LINUX

      - name: Build with ThreadSanitizer (TSan)
        run: |
          cmake --build build-tsan --config Debug -j$(nproc)

      - name: Run Tests with ThreadSanitizer (TSan)
        env:
          TSAN_OPTIONS: "halt_on_error=1 history_size=7 suppressions=${{ github.workspace }}/tests/tsan.supp"
        run: |
          cd build-tsan
          ctest -T Test --output-on-failure

      - name: Generate XLS Test Report
        if: always()
        run: |
          python3 tests/generate_xls_report.py test_report.xlsx

      - name: Generate Cppcheck XLS Report
        if: always()
        run: |
          if [ -f "cppcheck_report.xml" ]; then
            python3 tests/generate_cppcheck_report.py cppcheck_report.xml cppcheck_report.xlsx
          else
            echo "::warning:: Cppcheck XML report was not found. Excel report will not be generated."
          fi

      - name: Generate ASan & UBSan XLS Reports
        if: always()
        run: |
          if [ -d "build-sanitizers" ]; then
            python3 tests/generate_xls_report.py asan_report.xlsx build-sanitizers
            python3 tests/generate_xls_report.py ubsan_report.xlsx build-sanitizers
          else
            echo "::warning:: build-sanitizers directory not found. ASan & UBSan reports will not be generated."
          fi

      - name: Upload Test Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-execution-report
          path: test_report.xlsx
          if-no-files-found: warn

      - name: Upload Cppcheck Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-report
          path: cppcheck_report.xlsx
          if-no-files-found: warn

      - name: Upload ASan Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asan-report
          path: asan_report.xlsx
          if-no-files-found: warn

      - name: Upload UBSan Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ubsan-report
          path: ubsan_report.xlsx
          if-no-files-found: warn

  build-packages:
    name: Build & Package (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            os_name: linux
            cc: ccache gcc
            cxx: ccache g++
            apt_packages: "libsdl2-dev libgtk-3-dev ccache"
            cmake_args: "-DPLATFORM=LINUX -DCMAKE_BUILD_TYPE=Release"
            artifact_name: NaikAVPlayer-linux-x64
            executable_name: NaikAVPlayer
            is_native: true

          - target: windows-x86_64
            os_name: windows
            cc: ccache x86_64-w64-mingw32-gcc
            cxx: ccache x86_64-w64-mingw32-g++
            apt_packages: "mingw-w64 ccache"
            cmake_args: "-DPLATFORM=WINDOWS -DCMAKE_SYSTEM_NAME=Windows -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++ -DCMAKE_BUILD_TYPE=Release"
            artifact_name: NaikAVPlayer-windows-x64
            executable_name: NaikAVPlayer.exe
            is_native: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Setup Compiler Cache (ccache)
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ matrix.target }}-ccache

      - name: Configure CMake
        env:
          CC: "${{ matrix.cc }}"
          CXX: "${{ matrix.cxx }}"
        run: |
          cmake -B build ${{ matrix.cmake_args }} -DTREAT_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: |
          cmake --build build --config Release -j$(nproc)

      - name: Validate Linux Binaries (ldd/readelf)
        if: matrix.os_name == 'linux'
        run: |
          if [ "${{ matrix.is_native }}" = "true" ]; then
            echo "Running ldd on native binary..."
            ldd build/${{ matrix.executable_name }}
          else
            echo "Running readelf on cross-compiled binary..."
            aarch64-linux-gnu-readelf -d build/${{ matrix.executable_name }}
          fi

      - name: Assemble Release Package
        run: |
          mkdir -p package/LICENSES
          mkdir -p package/lib
          mkdir -p package/assets
          
          # Copy Binary
          cp build/${{ matrix.executable_name }} package/
          
          # Copy Assets
          cp -r assets/* package/assets/
          
          # Copy README
          cp README.md package/
          
          # Copy Licenses
          cp LICENSE package/LICENSES/
          if [ -f "thirdparty/ffmpeg/LICENSE.txt" ]; then
            cp thirdparty/ffmpeg/LICENSE.txt package/LICENSES/FFMPEG_LICENSE.txt
          fi
          
          # Copy Libraries
          if [ "${{ matrix.os_name }}" = "windows" ]; then
            cp build/*.dll package/
          else
            cp build/lib/*.so* package/lib/ 2>/dev/null || true
          fi

      - name: Upload Artifact
        if: startsWith(github.ref, 'refs/heads/release')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: package/
          if-no-files-found: error

  build-package-aarch64:
    name: Build & Package (linux-aarch64)
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04
    steps:
      - name: Install minimal container tools
        run: |
          apt-get update
          apt-get install -y git curl unzip tar xz-utils sudo

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Multiarch Sysroot and Dependencies
        run: |
          dpkg --add-architecture arm64
          # Update sources.list to use archive.ubuntu.com only for amd64, and ports.ubuntu.com for arm64
          sed -i 's/deb http/deb [arch=amd64,i386] http/g' /etc/apt/sources.list
          cat <<EOF >> /etc/apt/sources.list.d/arm64.list
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-security main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-backports main restricted universe multiverse
          EOF
          apt-get update
          # Install cross-compiler and build tools
          apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu ccache cmake pkg-config python3
          # Install ARM64 UI, rendering, and audio dev libraries for SDL3 + NFD
          apt-get install -y libx11-dev:arm64 libxext-dev:arm64 libxcursor-dev:arm64 libxi-dev:arm64 \
                             libxrandr-dev:arm64 libxss-dev:arm64 libwayland-dev:arm64 libxkbcommon-dev:arm64 \
                             libdrm-dev:arm64 libgbm-dev:arm64 libxtst-dev:arm64 libasound2-dev:arm64 \
                             libpulse-dev:arm64 libgtk-3-dev:arm64

      - name: Setup Compiler Cache (ccache)
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: linux-aarch64-ccache

      - name: Configure CMake
        env:
          CC: "ccache aarch64-linux-gnu-gcc"
          CXX: "ccache aarch64-linux-gnu-g++"
          PKG_CONFIG_LIBDIR: "/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig"
          PKG_CONFIG_SYSROOT_DIR: "/"
        run: |
          cmake -B build -DPLATFORM=LINUX -DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
                -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
                -DCMAKE_LIBRARY_ARCHITECTURE=aarch64-linux-gnu \
                -DCMAKE_BUILD_TYPE=Release -DTREAT_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: |
          cmake --build build --config Release -j$(nproc)

      - name: Validate Linux Binaries (readelf)
        run: |
          echo "Running readelf on cross-compiled binary..."
          aarch64-linux-gnu-readelf -d build/NaikAVPlayer

      - name: Assemble Release Package
        run: |
          mkdir -p package/LICENSES
          mkdir -p package/lib
          mkdir -p package/assets
          
          # Copy Binary
          cp build/NaikAVPlayer package/
          
          # Copy Assets
          cp -r assets/* package/assets/
          
          # Copy README
          cp README.md package/
          
          # Copy Licenses
          cp LICENSE package/LICENSES/
          if [ -f "thirdparty/ffmpeg/LICENSE.txt" ]; then
            cp thirdparty/ffmpeg/LICENSE.txt package/LICENSES/FFMPEG_LICENSE.txt
          fi
          
          # Copy Libraries
          cp build/lib/*.so* package/lib/ 2>/dev/null || true

      - name: Upload Artifact
        if: startsWith(github.ref, 'refs/heads/release')
        uses: actions/upload-artifact@v4
        with:
          name: NaikAVPlayer-linux-arm64
          path: package/
          if-no-files-found: error
