name: CI/CD Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-linux:
    name: Linux Build & Test (GCC)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Python Dependencies
        run: |
          python3 -m pip install openpyxl

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswscale-dev \
            libswresample-dev \
            libsdl2-dev \
            libgtk-3-dev \
            ccache \
            cppcheck \
            lcov

      - name: Setup Compiler Cache (ccache)
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: linux-gcc-ccache

      - name: Configure CMake (Native Linux)
        env:
          CC: "ccache gcc"
          CXX: "ccache g++"
        run: |
          cmake -B build-linux \
            -DCMAKE_BUILD_TYPE=Release \
            -DTREAT_WARNINGS_AS_ERRORS=ON \
            -DPLATFORM=LINUX

      - name: Build (Native Linux)
        run: |
          cmake --build build-linux --config Release -j$(nproc)

      - name: Run Tests (Native Linux)
        run: |
          cd build-linux
          ctest -T Test --output-on-failure

      - name: Capture and Filter Coverage
        run: |
          lcov --directory build-linux --capture --output-file coverage.info
          lcov --remove coverage.info '/usr/*' '*/thirdparty/*' '*/tests/*' --output-file coverage.info
          lcov --list coverage.info

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.info
          fail_ci_if_error: false

      - name: Run Static Analysis (cppcheck)
        run: |
          cppcheck --enable=warning,style,performance,portability \
            --inline-suppr \
            --std=c++17 \
            --error-exitcode=1 \
            --xml \
            --xml-version=2 \
            src/ tests/ 2> cppcheck_report.xml

      - name: Configure CMake with Sanitizers (ASan/UBSan)
        env:
          CC: "ccache gcc"
          CXX: "ccache g++"
        run: |
          cmake -B build-sanitizers \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_SANITIZERS=ON \
            -DPLATFORM=LINUX

      - name: Build with Sanitizers (ASan/UBSan)
        run: |
          cmake --build build-sanitizers --config Debug -j$(nproc)

      - name: Run Tests with Sanitizers
        env:
          ASAN_OPTIONS: detect_leaks=1
          LSAN_OPTIONS: suppressions=${{ github.workspace }}/tests/lsan.supp
        run: |
          cd build-sanitizers
          ctest -T Test --output-on-failure

      - name: Configure CMake with ThreadSanitizer (TSan)
        env:
          CC: "ccache gcc"
          CXX: "ccache g++"
        run: |
          cmake -B build-tsan \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_TSAN=ON \
            -DPLATFORM=LINUX

      - name: Build with ThreadSanitizer (TSan)
        run: |
          cmake --build build-tsan --config Debug -j$(nproc)

      - name: Run Tests with ThreadSanitizer (TSan)
        env:
          TSAN_OPTIONS: "halt_on_error=1 history_size=7 suppressions=${{ github.workspace }}/tests/tsan.supp"
        run: |
          cd build-tsan
          ctest -T Test --output-on-failure

      - name: Generate XLS Test Report
        if: always()
        run: |
          python3 tests/generate_xls_report.py test_report.xlsx

      - name: Generate Cppcheck XLS Report
        if: always()
        run: |
          if [ -f "cppcheck_report.xml" ]; then
            python3 tests/generate_cppcheck_report.py cppcheck_report.xml cppcheck_report.xlsx
          else
            echo "::warning:: Cppcheck XML report was not found. Excel report will not be generated."
          fi

      - name: Generate ASan & UBSan XLS Reports
        if: always()
        run: |
          if [ -d "build-sanitizers" ]; then
            python3 tests/generate_xls_report.py asan_report.xlsx build-sanitizers
            python3 tests/generate_xls_report.py ubsan_report.xlsx build-sanitizers
          else
            echo "::warning:: build-sanitizers directory not found. ASan & UBSan reports will not be generated."
          fi

      - name: Diagnostic Logging
        if: always()
        run: |
          echo "=== Diagnostic Log ==="
          echo "Current working directory: $(pwd)"
          echo "Generated report locations:"
          ls -la *.xlsx 2>/dev/null || echo "No .xlsx reports found in root"
          echo "Executable output locations:"
          ls -la build-linux/NaikAVPlayer 2>/dev/null || echo "Linux Release Executable not found"
          ls -la build-sanitizers/NaikAVPlayer 2>/dev/null || echo "Linux Sanitizers Executable not found"
          ls -la build-tsan/NaikAVPlayer 2>/dev/null || echo "Linux TSan Executable not found"
          echo "Files in workspace:"
          find . -maxdepth 3 -not -path '*/.*' -not -path './build*' -not -path './thirdparty*'

      - name: Upload Test Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-execution-report
          path: test_report.xlsx
          if-no-files-found: warn

      - name: Upload Cppcheck Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-report
          path: cppcheck_report.xlsx
          if-no-files-found: warn

      - name: Upload ASan Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asan-report
          path: asan_report.xlsx
          if-no-files-found: warn

      - name: Upload UBSan Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ubsan-report
          path: ubsan_report.xlsx
          if-no-files-found: warn

  cross-compile-windows:
    name: Windows Cross-Compilation (MinGW-w64 on Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Cross-Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            mingw-w64 \
            ccache

      - name: Setup Compiler Cache (ccache)
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: windows-mingw-ccache

      - name: Configure CMake (Cross-Compile for Windows)
        env:
          CC: "ccache x86_64-w64-mingw32-gcc"
          CXX: "ccache x86_64-w64-mingw32-g++"
        run: |
          cmake -B build-windows \
            -DPLATFORM=WINDOWS \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc \
            -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++ \
            -DTREAT_WARNINGS_AS_ERRORS=ON \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build (Cross-Compile for Windows)
        run: |
          cmake --build build-windows --config Release -j$(nproc)

      - name: Diagnostic Logging
        if: always()
        run: |
          echo "=== Diagnostic Log ==="
          echo "Current working directory: $(pwd)"
          echo "Executable output locations:"
          ls -la build-windows/NaikAVPlayer.exe 2>/dev/null || echo "Windows Executable not found"
          echo "Files in workspace:"
          find . -maxdepth 3 -not -path '*/.*' -not -path './build*' -not -path './thirdparty*'
