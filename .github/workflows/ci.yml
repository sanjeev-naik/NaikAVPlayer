name: CI/CD Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-linux:
    name: Linux Build & Test (GCC)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Python Dependencies
        run: |
          python3 -m pip install openpyxl

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            libsdl2-dev \
            libgtk-3-dev \
            libva-dev \
            libvdpau-dev \
            ccache \
            cppcheck \
            lcov \
            libdrm-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            wayland-protocols \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxss-dev \
            libgbm-dev \
            libgles-dev \
            libegl-dev \
            libdbus-1-dev \
            libpulse-dev \
            libasound2-dev

      - name: Cache FFmpeg Build (Linux x64)
        id: cache-ffmpeg-linux-x64
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/thirdparty/ffmpeg
          key: ${{ runner.os }}-ffmpeg-8.1-ce3c09c101-linux-x64-v1

      - name: Build FFmpeg from source (Linux x64)
        if: steps.cache-ffmpeg-linux-x64.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
          cd ffmpeg-src
          git checkout ce3c09c101
          ./configure \
            --prefix=${{ github.workspace }}/thirdparty/ffmpeg \
            --enable-shared \
            --disable-static \
            --disable-programs \
            --disable-doc \
            --disable-avdevice \
            --disable-avfilter \
            --enable-v4l2-m2m \
            --enable-libdrm
          make -j$(nproc)
          make install

      - name: Setup Compiler Cache (ccache)
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: linux-gcc-ccache

      - name: Configure CMake (Native Linux)
        env:
          CC: "ccache gcc"
          CXX: "ccache g++"
        run: |
          cmake -B build-linux \
            -DCMAKE_BUILD_TYPE=Release \
            -DTREAT_WARNINGS_AS_ERRORS=ON \
            -DPLATFORM=LINUX \
            -DENABLE_FFMPEG_AUTO_DOWNLOAD=OFF

      - name: Build (Native Linux)
        run: |
          cmake --build build-linux --config Release -j$(nproc)

      - name: Run Tests (Native Linux)
        run: |
          cd build-linux
          ctest -T Test --output-on-failure

      - name: Capture and Filter Coverage
        run: |
          lcov --directory build-linux --capture --output-file coverage.info
          lcov --remove coverage.info '/usr/*' '*/thirdparty/*' '*/tests/*' --output-file coverage.info --ignore-errors unused
          lcov --list coverage.info --ignore-errors unused

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.info
          fail_ci_if_error: false

      - name: Run Static Analysis (cppcheck)
        run: |
          cppcheck --enable=warning,style,performance,portability \
            --inline-suppr \
            --std=c++17 \
            --error-exitcode=1 \
            --xml \
            --xml-version=2 \
            src/ tests/ 2> cppcheck_report.xml

      - name: Configure CMake with Sanitizers (ASan/UBSan)
        env:
          CC: "ccache gcc"
          CXX: "ccache g++"
        run: |
          cmake -B build-sanitizers \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_SANITIZERS=ON \
            -DPLATFORM=LINUX \
            -DENABLE_FFMPEG_AUTO_DOWNLOAD=OFF

      - name: Build with Sanitizers (ASan/UBSan)
        run: |
          cmake --build build-sanitizers --config Debug -j$(nproc)

      - name: Run Tests with Sanitizers
        env:
          ASAN_OPTIONS: detect_leaks=1
          LSAN_OPTIONS: suppressions=${{ github.workspace }}/tests/lsan.supp
        run: |
          cd build-sanitizers
          ctest -T Test --output-on-failure

      - name: Configure CMake with ThreadSanitizer (TSan)
        env:
          CC: "ccache gcc"
          CXX: "ccache g++"
        run: |
          cmake -B build-tsan \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_TSAN=ON \
            -DPLATFORM=LINUX \
            -DENABLE_FFMPEG_AUTO_DOWNLOAD=OFF

      - name: Build with ThreadSanitizer (TSan)
        run: |
          cmake --build build-tsan --config Debug -j$(nproc)

      - name: Run Tests with ThreadSanitizer (TSan)
        env:
          TSAN_OPTIONS: "halt_on_error=1 history_size=7 suppressions=${{ github.workspace }}/tests/tsan.supp"
        run: |
          cd build-tsan
          ctest -T Test --output-on-failure

      - name: Generate XLS Test Report
        if: always()
        run: |
          python3 tests/generate_xls_report.py test_report.xlsx

      - name: Generate Cppcheck XLS Report
        if: always()
        run: |
          if [ -f "cppcheck_report.xml" ]; then
            python3 tests/generate_cppcheck_report.py cppcheck_report.xml cppcheck_report.xlsx
          else
            echo "::warning:: Cppcheck XML report was not found. Excel report will not be generated."
          fi

      - name: Generate ASan & UBSan XLS Reports
        if: always()
        run: |
          if [ -d "build-sanitizers" ]; then
            python3 tests/generate_xls_report.py asan_report.xlsx build-sanitizers
            python3 tests/generate_xls_report.py ubsan_report.xlsx build-sanitizers
          else
            echo "::warning:: build-sanitizers directory not found. ASan & UBSan reports will not be generated."
          fi

      - name: Diagnostic Logging
        if: always()
        run: |
          echo "=== Diagnostic Log ==="
          echo "Current working directory: $(pwd)"
          echo "Generated report locations:"
          ls -la *.xlsx 2>/dev/null || echo "No .xlsx reports found in root"
          echo "Executable output locations:"
          ls -la build-linux/NaikAVPlayer 2>/dev/null || echo "Linux Release Executable not found"
          ls -la build-sanitizers/NaikAVPlayer 2>/dev/null || echo "Linux Sanitizers Executable not found"
          ls -la build-tsan/NaikAVPlayer 2>/dev/null || echo "Linux TSan Executable not found"
          echo "Files in workspace:"
          find . -maxdepth 3 -not -path '*/.*' -not -path './build*' -not -path './thirdparty*'

      - name: Collect CI Diagnostics
        if: always()
        run: |
          mkdir -p diagnostics-linux-x64
          echo "=== Compiler Version ===" > diagnostics-linux-x64/compiler_version.txt
          gcc --version >> diagnostics-linux-x64/compiler_version.txt 2>&1
          g++ --version >> diagnostics-linux-x64/compiler_version.txt 2>&1

          echo "=== CMake Version ===" > diagnostics-linux-x64/cmake_version.txt
          cmake --version >> diagnostics-linux-x64/cmake_version.txt 2>&1

          echo "=== FFmpeg Version ===" > diagnostics-linux-x64/ffmpeg_version.txt
          if [ -f thirdparty/ffmpeg/include/libavcodec/version.h ]; then
            echo "Built FFmpeg Headers version info:" >> diagnostics-linux-x64/ffmpeg_version.txt
            grep -E "LIBAVCODEC_VERSION_" thirdparty/ffmpeg/include/libavcodec/version.h >> diagnostics-linux-x64/ffmpeg_version.txt || true
          fi
          ffmpeg -version >> diagnostics-linux-x64/ffmpeg_version.txt 2>&1 || true

          echo "=== pkg-config versions ===" > diagnostics-linux-x64/pkg_config_versions.txt
          export PKG_CONFIG_PATH="${{ github.workspace }}/thirdparty/ffmpeg/lib/pkgconfig:$(find build-linux -name "*.pc" -exec dirname {} \; | tr '\n' ':'):$PKG_CONFIG_PATH"
          pkg-config --modversion libavcodec >> diagnostics-linux-x64/pkg_config_versions.txt 2>&1 || true
          pkg-config --modversion libavformat >> diagnostics-linux-x64/pkg_config_versions.txt 2>&1 || true
          pkg-config --modversion libavutil >> diagnostics-linux-x64/pkg_config_versions.txt 2>&1 || true
          pkg-config --modversion sdl3 >> diagnostics-linux-x64/pkg_config_versions.txt 2>&1 || true

          echo "=== FFmpeg hwaccels ===" > diagnostics-linux-x64/ffmpeg_hwaccels.txt
          ffmpeg -hwaccels >> diagnostics-linux-x64/ffmpeg_hwaccels.txt 2>&1 || true

          echo "=== FFmpeg decoders ===" > diagnostics-linux-x64/ffmpeg_decoders.txt
          ffmpeg -decoders >> diagnostics-linux-x64/ffmpeg_decoders.txt 2>&1 || true

          if [ -f build-linux/NaikAVPlayer ]; then
            echo "=== ldd NaikAVPlayer ===" > diagnostics-linux-x64/ldd_NaikAVPlayer.txt
            ldd build-linux/NaikAVPlayer >> diagnostics-linux-x64/ldd_NaikAVPlayer.txt 2>&1 || true

            echo "=== readelf NaikAVPlayer ===" > diagnostics-linux-x64/readelf_NaikAVPlayer.txt
            readelf -d build-linux/NaikAVPlayer >> diagnostics-linux-x64/readelf_NaikAVPlayer.txt 2>&1 || true

            echo "=== objdump NaikAVPlayer ===" > diagnostics-linux-x64/objdump_NaikAVPlayer.txt
            objdump -p build-linux/NaikAVPlayer >> diagnostics-linux-x64/objdump_NaikAVPlayer.txt 2>&1 || true
          fi

      - name: Upload Test Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-execution-report
          path: test_report.xlsx
          if-no-files-found: warn

      - name: Upload Cppcheck Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-report
          path: cppcheck_report.xlsx
          if-no-files-found: warn

      - name: Upload ASan Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asan-report
          path: asan_report.xlsx
          if-no-files-found: warn

      - name: Upload UBSan Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ubsan-report
          path: ubsan_report.xlsx
          if-no-files-found: warn

      # Packaging runs only for release activity (release/* branches, their PRs,
      # and v* tags) — never on normal development pushes.
      - name: Package Linux Release Executable
        if: >-
          success() && (
            startsWith(github.ref, 'refs/heads/release/') ||
            startsWith(github.ref, 'refs/tags/v') ||
            startsWith(github.head_ref, 'release/')
          )
        run: |
          mkdir -p NaikAVPlayer-linux-x64/lib
          cp build-linux/NaikAVPlayer NaikAVPlayer-linux-x64/
          find build-linux -name "libSDL3.so*" -exec cp -P {} NaikAVPlayer-linux-x64/lib/ \;
          if [ -d thirdparty/ffmpeg/lib ]; then
            cp -P thirdparty/ffmpeg/lib/libav*.so* thirdparty/ffmpeg/lib/libsw*.so* NaikAVPlayer-linux-x64/lib/
          fi
          cp -r assets NaikAVPlayer-linux-x64/
          rm -f NaikAVPlayer-linux-x64/assets/hd_test_video_with_audio.mp4 \
                NaikAVPlayer-linux-x64/assets/screenshot.png
          cp -r licenses NaikAVPlayer-linux-x64/
          cp LICENSE README.md NaikAVPlayer-linux-x64/

      - name: Verify Package Closure
        if: >-
          success() && (
            startsWith(github.ref, 'refs/heads/release/') ||
            startsWith(github.ref, 'refs/tags/v') ||
            startsWith(github.head_ref, 'release/')
          )
        run: |
          PKG_DIR="NaikAVPlayer-linux-x64"
          echo "=== Verifying RPATH/RUNPATH ==="
          RUNPATH_CHECK=$(readelf -d "$PKG_DIR/NaikAVPlayer" | grep -E "R(UN)?PATH")
          echo "$RUNPATH_CHECK"
          if ! echo "$RUNPATH_CHECK" | grep -q '\$ORIGIN/lib'; then
            echo "::error::RUNPATH is not set to \$ORIGIN/lib!"
            exit 1
          fi

          echo "=== Verifying Bundled Shared Libraries ==="
          ls -l "$PKG_DIR/lib/"
          
          REQUIRED_LIBS=("libSDL3.so" "libavcodec.so" "libavformat.so" "libavutil.so" "libswscale.so" "libswresample.so")
          for lib in "${REQUIRED_LIBS[@]}"; do
            if ! ls "$PKG_DIR/lib/" | grep -q "$lib"; then
              echo "::error::Missing bundled library: $lib"
              exit 1
            fi
          done

          echo "=== Verifying Binary Dependencies ==="
          NEEDED_LIBS=$(readelf -d "$PKG_DIR/NaikAVPlayer" | grep NEEDED | awk -F'[' '{print $2}' | awk -F']' '{print $1}')
          echo "Needed libraries:"
          echo "$NEEDED_LIBS"
          
          # Check if any needed library (specifically ffmpeg and sdl) is missing from lib/
          for needed in $NEEDED_LIBS; do
            case "$needed" in
              libav*|libsw*|libSDL3*)
                if [ ! -f "$PKG_DIR/lib/$needed" ]; then
                  resolved_base=$(echo "$needed" | sed -E 's/\.so\..*/.so/')
                  if ! ls "$PKG_DIR/lib/" | grep -q "$resolved_base"; then
                    echo "::error::Binary needs $needed but it or its base is not in lib/"
                    exit 1
                  fi
                fi
                ;;
            esac
          done
          echo "Package closure verification passed!"

      - name: Create Linux Tarball Package
        if: >-
          success() && (
            startsWith(github.ref, 'refs/heads/release/') ||
            startsWith(github.ref, 'refs/tags/v') ||
            startsWith(github.head_ref, 'release/')
          )
        run: |
          tar czf NaikAVPlayer-linux-x64.tar.gz NaikAVPlayer-linux-x64

      - name: Upload Linux Executable Package
        if: >-
          success() && (
            startsWith(github.ref, 'refs/heads/release/') ||
            startsWith(github.ref, 'refs/tags/v') ||
            startsWith(github.head_ref, 'release/')
          )
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-package
          path: NaikAVPlayer-linux-x64.tar.gz

      - name: Upload CI Diagnostics Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-linux-x64
          path: diagnostics-linux-x64/


  cross-compile-windows:
    name: Windows Cross-Compilation (MinGW-w64 on Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Cross-Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            mingw-w64 \
            ccache

      - name: Cache FFmpeg Build (Windows)
        id: cache-ffmpeg-windows
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/thirdparty/ffmpeg
          key: ${{ runner.os }}-ffmpeg-8.1-ce3c09c101-mingw-x64-v1

      - name: Build FFmpeg from source (Windows)
        if: steps.cache-ffmpeg-windows.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
          cd ffmpeg-src
          git checkout ce3c09c101
          ./configure \
            --prefix=${{ github.workspace }}/thirdparty/ffmpeg \
            --enable-shared \
            --disable-static \
            --disable-programs \
            --disable-doc \
            --disable-avdevice \
            --disable-avfilter \
            --enable-cross-compile \
            --cross-prefix=x86_64-w64-mingw32- \
            --arch=x86_64 \
            --target-os=mingw32 \
            --cc=x86_64-w64-mingw32-gcc \
            --cxx=x86_64-w64-mingw32-g++
          make -j$(nproc)
          make install

      - name: Setup Compiler Cache (ccache)
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: windows-mingw-ccache

      - name: Configure CMake (Cross-Compile for Windows)
        env:
          CC: "ccache x86_64-w64-mingw32-gcc"
          CXX: "ccache x86_64-w64-mingw32-g++"
        run: |
          cmake -B build-windows \
            -DPLATFORM=WINDOWS \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc \
            -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++ \
            -DTREAT_WARNINGS_AS_ERRORS=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_FFMPEG_AUTO_DOWNLOAD=OFF

      - name: Build (Cross-Compile for Windows)
        run: |
          cmake --build build-windows --config Release -j$(nproc)

      - name: Diagnostic Logging
        if: always()
        run: |
          echo "=== Diagnostic Log ==="
          echo "Current working directory: $(pwd)"
          echo "Executable output locations:"
          ls -la build-windows/NaikAVPlayer.exe 2>/dev/null || echo "Windows Executable not found"
          echo "Files in workspace:"
          find . -maxdepth 3 -not -path '*/.*' -not -path './build*' -not -path './thirdparty*'

      # Packaging runs only for release activity (release/* branches, their PRs,
      # and v* tags) — never on normal development pushes.
      - name: Package Windows Release Executable
        if: >-
          success() && (
            startsWith(github.ref, 'refs/heads/release/') ||
            startsWith(github.ref, 'refs/tags/v') ||
            startsWith(github.head_ref, 'release/')
          )
        run: |
          mkdir -p NaikAVPlayer-windows-x64
          cp build-windows/NaikAVPlayer.exe build-windows/*.dll NaikAVPlayer-windows-x64/
          find /usr/x86_64-w64-mingw32 /usr/lib/gcc/x86_64-w64-mingw32 \
            -name "libwinpthread-1.dll" -exec cp {} NaikAVPlayer-windows-x64/ \; 2>/dev/null || true
          cp -r assets NaikAVPlayer-windows-x64/
          rm -f NaikAVPlayer-windows-x64/assets/hd_test_video_with_audio.mp4 \
                NaikAVPlayer-windows-x64/assets/screenshot.png
          cp -r licenses NaikAVPlayer-windows-x64/
          cp LICENSE README.md NaikAVPlayer-windows-x64/
          zip -r NaikAVPlayer-windows-x64.zip NaikAVPlayer-windows-x64

      - name: Upload Windows Executable Package
        if: >-
          success() && (
            startsWith(github.ref, 'refs/heads/release/') ||
            startsWith(github.ref, 'refs/tags/v') ||
            startsWith(github.head_ref, 'release/')
          )
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-package
          path: NaikAVPlayer-windows-x64.zip

  cross-compile-linux-aarch64:
    name: Linux aarch64 Build (ARM64 Cross-Compilation)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Cross-Compiler and Dependencies
        run: |
          sudo dpkg --add-architecture arm64

          # Restrict existing amd64 list sources to [arch=amd64]
          if [ -f /etc/apt/sources.list ]; then
            sudo sed -i -E 's/deb[[:space:]]+(http|https|mirror):/deb [arch=amd64] \1:/g' /etc/apt/sources.list
          fi
          if [ -d /etc/apt/sources.list.d ]; then
            find /etc/apt/sources.list.d/ -type f -name "*.list" -exec sudo sed -i -E 's/deb[[:space:]]+(http|https|mirror):/deb [arch=amd64] \1:/g' {} +
          fi

          # Restrict existing amd64 DEB822 sources to Architectures: amd64
          sudo python3 -c '
          import glob, os
          for p in glob.glob("/etc/apt/sources.list.d/*.sources"):
              with open(p, "r") as f:
                  lines = f.readlines()
              paragraphs = []
              current_paragraph = []
              for line in lines:
                  stripped = line.strip()
                  if not stripped:
                      if current_paragraph:
                          paragraphs.append(current_paragraph)
                          current_paragraph = []
                      paragraphs.append(line)
                  else:
                      current_paragraph.append(line)
              if current_paragraph:
                  paragraphs.append(current_paragraph)
              new_content = []
              modified = False
              for item in paragraphs:
                  if isinstance(item, list):
                      has_suites = any(l.strip().startswith("Suites:") for l in item)
                      has_arch = any(l.strip().startswith("Architectures:") for l in item)
                      if has_suites and not has_arch:
                          for idx, l in enumerate(item):
                              if l.strip().startswith("Suites:"):
                                  indent = l[:len(l) - len(l.lstrip())]
                                  item.insert(idx, f"{indent}Architectures: amd64\n")
                                  modified = True
                                  break
                      new_content.extend(item)
                  else:
                      new_content.append(item)
              if modified:
                  with open(p, "w") as f:
                      f.writelines(new_content)
          '

          # Add arm64 sources
          sudo tee /etc/apt/sources.list.d/arm64.list <<EOF
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ $(lsb_release -cs) main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ $(lsb_release -cs)-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ $(lsb_release -cs)-security main restricted universe multiverse
          EOF

          sudo apt-get update
          sudo apt-get install -y \
            g++-aarch64-linux-gnu \
            libgtk-3-dev:arm64 \
            libasound2-dev:arm64 \
            libxss-dev:arm64 \
            libva-dev:arm64 \
            libvdpau-dev:arm64 \
            libdrm-dev:arm64 \
            libudev-dev:arm64 \
            libwayland-dev:arm64 \
            libxkbcommon-dev:arm64 \
            wayland-protocols \
            libx11-dev:arm64 \
            libxrandr-dev:arm64 \
            libxcursor-dev:arm64 \
            libxext-dev:arm64 \
            libxfixes-dev:arm64 \
            libxi-dev:arm64 \
            libgbm-dev:arm64 \
            libgles-dev:arm64 \
            libegl-dev:arm64 \
            libdbus-1-dev:arm64 \
            libpulse-dev:arm64 \
            qemu-user-static \
            ffmpeg:arm64 \
            ccache

      - name: Cache FFmpeg Build (Linux aarch64)
        id: cache-ffmpeg-linux-aarch64
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/thirdparty/ffmpeg
          key: ${{ runner.os }}-ffmpeg-8.1-ce3c09c101-linux-aarch64-v1

      - name: Build FFmpeg from source (Linux aarch64)
        if: steps.cache-ffmpeg-linux-aarch64.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
          cd ffmpeg-src
          git checkout ce3c09c101
          PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig \
          PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig \
          ./configure \
            --prefix=${{ github.workspace }}/thirdparty/ffmpeg \
            --enable-shared \
            --disable-static \
            --disable-programs \
            --disable-doc \
            --disable-avdevice \
            --disable-avfilter \
            --enable-cross-compile \
            --cross-prefix=aarch64-linux-gnu- \
            --arch=aarch64 \
            --target-os=linux \
            --cc=aarch64-linux-gnu-gcc \
            --cxx=aarch64-linux-gnu-g++ \
            --enable-v4l2-m2m \
            --enable-libdrm \
            --pkg-config=aarch64-linux-gnu-pkg-config
          make -j$(nproc)
          make install

      - name: Setup Compiler Cache (ccache)
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: linux-aarch64-ccache

      - name: Configure CMake (Cross-Compile for Linux aarch64)
        env:
          CC: "ccache aarch64-linux-gnu-gcc"
          CXX: "ccache aarch64-linux-gnu-g++"
          PKG_CONFIG_PATH: "/usr/lib/aarch64-linux-gnu/pkgconfig"
        run: |
          cmake -B build-linux-aarch64 \
            -DPLATFORM=LINUX \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DTREAT_WARNINGS_AS_ERRORS=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_FFMPEG_AUTO_DOWNLOAD=OFF

      - name: Build (Cross-Compile for Linux aarch64)
        run: |
          cmake --build build-linux-aarch64 --config Release -j$(nproc)

      - name: Diagnostic Logging
        if: always()
        run: |
          echo "=== Diagnostic Log ==="
          echo "Current working directory: $(pwd)"
          echo "Executable output locations:"
          ls -la build-linux-aarch64/NaikAVPlayer 2>/dev/null || echo "Linux aarch64 Executable not found"

      - name: Collect CI Diagnostics
        if: always()
        run: |
          mkdir -p diagnostics-linux-aarch64
          echo "=== Compiler Version ===" > diagnostics-linux-aarch64/compiler_version.txt
          aarch64-linux-gnu-gcc --version >> diagnostics-linux-aarch64/compiler_version.txt 2>&1
          aarch64-linux-gnu-g++ --version >> diagnostics-linux-aarch64/compiler_version.txt 2>&1

          echo "=== CMake Version ===" > diagnostics-linux-aarch64/cmake_version.txt
          cmake --version >> diagnostics-linux-aarch64/cmake_version.txt 2>&1

          echo "=== FFmpeg Version ===" > diagnostics-linux-aarch64/ffmpeg_version.txt
          if [ -f thirdparty/ffmpeg/include/libavcodec/version.h ]; then
            echo "Built FFmpeg Headers version info:" >> diagnostics-linux-aarch64/ffmpeg_version.txt
            grep -E "LIBAVCODEC_VERSION_" thirdparty/ffmpeg/include/libavcodec/version.h >> diagnostics-linux-aarch64/ffmpeg_version.txt || true
          fi
          ffmpeg -version >> diagnostics-linux-aarch64/ffmpeg_version.txt 2>&1 || true

          echo "=== pkg-config versions ===" > diagnostics-linux-aarch64/pkg_config_versions.txt
          export PKG_CONFIG_PATH="${{ github.workspace }}/thirdparty/ffmpeg/lib/pkgconfig:$(find build-linux-aarch64 -name "*.pc" -exec dirname {} \; | tr '\n' ':'):/usr/lib/aarch64-linux-gnu/pkgconfig:$PKG_CONFIG_PATH"
          pkg-config --modversion libavcodec >> diagnostics-linux-aarch64/pkg_config_versions.txt 2>&1 || true
          pkg-config --modversion libavformat >> diagnostics-linux-aarch64/pkg_config_versions.txt 2>&1 || true
          pkg-config --modversion libavutil >> diagnostics-linux-aarch64/pkg_config_versions.txt 2>&1 || true
          pkg-config --modversion sdl3 >> diagnostics-linux-aarch64/pkg_config_versions.txt 2>&1 || true

          echo "=== FFmpeg hwaccels ===" > diagnostics-linux-aarch64/ffmpeg_hwaccels.txt
          ffmpeg -hwaccels >> diagnostics-linux-aarch64/ffmpeg_hwaccels.txt 2>&1 || true

          echo "=== FFmpeg decoders ===" > diagnostics-linux-aarch64/ffmpeg_decoders.txt
          ffmpeg -decoders >> diagnostics-linux-aarch64/ffmpeg_decoders.txt 2>&1 || true

          if [ -f build-linux-aarch64/NaikAVPlayer ]; then
            echo "=== ldd NaikAVPlayer ===" > diagnostics-linux-aarch64/ldd_NaikAVPlayer.txt
            aarch64-linux-gnu-readelf -d build-linux-aarch64/NaikAVPlayer | grep NEEDED >> diagnostics-linux-aarch64/ldd_NaikAVPlayer.txt 2>&1 || true

            echo "=== readelf NaikAVPlayer ===" > diagnostics-linux-aarch64/readelf_NaikAVPlayer.txt
            aarch64-linux-gnu-readelf -d build-linux-aarch64/NaikAVPlayer >> diagnostics-linux-aarch64/readelf_NaikAVPlayer.txt 2>&1 || true

            echo "=== objdump NaikAVPlayer ===" > diagnostics-linux-aarch64/objdump_NaikAVPlayer.txt
            aarch64-linux-gnu-objdump -p build-linux-aarch64/NaikAVPlayer >> diagnostics-linux-aarch64/objdump_NaikAVPlayer.txt 2>&1 || true
          fi

      - name: Package Linux aarch64 Release Executable
        if: >-
          success() && (
            startsWith(github.ref, 'refs/heads/release/') ||
            startsWith(github.ref, 'refs/tags/v') ||
            startsWith(github.head_ref, 'release/')
          )
        run: |
          mkdir -p NaikAVPlayer-linux-aarch64/lib
          cp build-linux-aarch64/NaikAVPlayer NaikAVPlayer-linux-aarch64/
          find build-linux-aarch64 -name "libSDL3.so*" -exec cp -P {} NaikAVPlayer-linux-aarch64/lib/ \;
          if [ -d thirdparty/ffmpeg/lib ]; then
            cp -P thirdparty/ffmpeg/lib/libav*.so* thirdparty/ffmpeg/lib/libsw*.so* NaikAVPlayer-linux-aarch64/lib/
          fi
          cp -r assets NaikAVPlayer-linux-aarch64/
          rm -f NaikAVPlayer-linux-aarch64/assets/hd_test_video_with_audio.mp4 \
                NaikAVPlayer-linux-aarch64/assets/screenshot.png
          cp -r licenses NaikAVPlayer-linux-aarch64/
          cp LICENSE README.md NaikAVPlayer-linux-aarch64/

      - name: Verify Package Closure
        if: >-
          success() && (
            startsWith(github.ref, 'refs/heads/release/') ||
            startsWith(github.ref, 'refs/tags/v') ||
            startsWith(github.head_ref, 'release/')
          )
        run: |
          PKG_DIR="NaikAVPlayer-linux-aarch64"
          echo "=== Verifying RPATH/RUNPATH ==="
          RUNPATH_CHECK=$(aarch64-linux-gnu-readelf -d "$PKG_DIR/NaikAVPlayer" | grep -E "R(UN)?PATH")
          echo "$RUNPATH_CHECK"
          if ! echo "$RUNPATH_CHECK" | grep -q '\$ORIGIN/lib'; then
            echo "::error::RUNPATH is not set to \$ORIGIN/lib!"
            exit 1
          fi

          echo "=== Verifying Bundled Shared Libraries ==="
          ls -l "$PKG_DIR/lib/"
          
          REQUIRED_LIBS=("libSDL3.so" "libavcodec.so" "libavformat.so" "libavutil.so" "libswscale.so" "libswresample.so")
          for lib in "${REQUIRED_LIBS[@]}"; do
            if ! ls "$PKG_DIR/lib/" | grep -q "$lib"; then
              echo "::error::Missing bundled library: $lib"
              exit 1
            fi
          done

          echo "=== Verifying Binary Dependencies ==="
          NEEDED_LIBS=$(aarch64-linux-gnu-readelf -d "$PKG_DIR/NaikAVPlayer" | grep NEEDED | awk -F'[' '{print $2}' | awk -F']' '{print $1}')
          echo "Needed libraries:"
          echo "$NEEDED_LIBS"
          
          # Check if any needed library (specifically ffmpeg and sdl) is missing from lib/
          for needed in $NEEDED_LIBS; do
            case "$needed" in
              libav*|libsw*|libSDL3*)
                if [ ! -f "$PKG_DIR/lib/$needed" ]; then
                  resolved_base=$(echo "$needed" | sed -E 's/\.so\..*/.so/')
                  if ! ls "$PKG_DIR/lib/" | grep -q "$resolved_base"; then
                    echo "::error::Binary needs $needed but it or its base is not in lib/"
                    exit 1
                  fi
                fi
                ;;
            esac
          done
          echo "Package closure verification passed!"

      - name: Create Linux Tarball Package
        if: >-
          success() && (
            startsWith(github.ref, 'refs/heads/release/') ||
            startsWith(github.ref, 'refs/tags/v') ||
            startsWith(github.head_ref, 'release/')
          )
        run: |
          tar czf NaikAVPlayer-linux-aarch64.tar.gz NaikAVPlayer-linux-aarch64

      - name: Upload Linux aarch64 Executable Package
        if: >-
          success() && (
            startsWith(github.ref, 'refs/heads/release/') ||
            startsWith(github.ref, 'refs/tags/v') ||
            startsWith(github.head_ref, 'release/')
          )
        uses: actions/upload-artifact@v4
        with:
          name: linux-aarch64-release-package
          path: NaikAVPlayer-linux-aarch64.tar.gz

      - name: Upload CI Diagnostics Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-linux-aarch64
          path: diagnostics-linux-aarch64/
