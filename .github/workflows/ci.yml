name: CI/CD Pipeline

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test-and-analysis:
    name: Native Linux Testing & Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Python Dependencies
        run: |
          python3 -m pip install openpyxl

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswscale-dev \
            libswresample-dev \
            libgtk-3-dev \
            libxss-dev \
            ccache \
            cppcheck \
            lcov

      - name: Verify Documentation & License Repository Integrity
        run: |
          echo "Verifying presence of critical repository documentation and licenses..."
          for file in README.md help.md LICENSE; do
            if [ ! -f "$file" ]; then
              echo "::error:: Required repository file '$file' is missing!"
              exit 1
            fi
          done
          if [ ! -d "licenses" ] || [ -z "$(ls -A licenses)" ]; then
            echo "::error:: Source 'licenses/' directory is missing or empty!"
            exit 1
          fi
          echo "Repository file integrity check passed."

      - name: Setup Compiler Cache (ccache)
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: linux-gcc-ccache

      - name: Configure CMake (Native Linux Release)
        env:
          CC: "ccache gcc"
          CXX: "ccache g++"
        run: |
          cmake -B build-linux \
            -DCMAKE_BUILD_TYPE=Release \
            -DTREAT_WARNINGS_AS_ERRORS=ON \
            -DPLATFORM=LINUX

      - name: Build (Native Linux Release)
        run: |
          cmake --build build-linux --config Release -j$(nproc)

      - name: Run Tests (Native Linux Release)
        env:
          SDL_AUDIO_DRIVER: dummy
          SDL_VIDEODRIVER: offscreen
        run: |
          ctest --test-dir build-linux --output-on-failure

      - name: Capture and Filter Coverage
        run: |
          lcov --directory build-linux --capture --output-file coverage.info
          lcov --remove coverage.info '/usr/*' '*/thirdparty/*' '*/tests/*' --output-file coverage.info --ignore-errors unused
          lcov --list coverage.info --ignore-errors unused

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.info
          fail_ci_if_error: false

      - name: Run Static Analysis (cppcheck)
        run: |
          cppcheck --enable=warning,style,performance,portability \
            --inline-suppr \
            --std=c++17 \
            --error-exitcode=1 \
            --xml \
            --xml-version=2 \
            src/ tests/ 2> cppcheck_report.xml

      - name: Configure CMake with Sanitizers (ASan/UBSan Debug)
        env:
          CC: "ccache gcc"
          CXX: "ccache g++"
        run: |
          cmake -B build-sanitizers \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_SANITIZERS=ON \
            -DPLATFORM=LINUX

      - name: Build with Sanitizers (ASan/UBSan Debug)
        run: |
          cmake --build build-sanitizers --config Debug -j$(nproc)

      - name: Run Tests with Sanitizers (ASan/UBSan)
        env:
          ASAN_OPTIONS: detect_leaks=1
          LSAN_OPTIONS: suppressions=${{ github.workspace }}/tests/lsan.supp
          SDL_AUDIO_DRIVER: dummy
          SDL_VIDEODRIVER: offscreen
        run: |
          ctest --test-dir build-sanitizers --output-on-failure

      - name: Configure CMake with ThreadSanitizer (TSan Debug)
        env:
          CC: "ccache gcc"
          CXX: "ccache g++"
        run: |
          cmake -B build-tsan \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_TSAN=ON \
            -DPLATFORM=LINUX

      - name: Build with ThreadSanitizer (TSan Debug)
        run: |
          cmake --build build-tsan --config Debug -j$(nproc)

      - name: Run Tests with ThreadSanitizer (TSan)
        env:
          TSAN_OPTIONS: "halt_on_error=1 history_size=7 suppressions=${{ github.workspace }}/tests/tsan.supp"
          SDL_AUDIO_DRIVER: dummy
          SDL_VIDEODRIVER: offscreen
        run: |
          ctest --test-dir build-tsan --output-on-failure

      - name: Configure & Build RelWithDebInfo Check
        env:
          CC: "ccache gcc"
          CXX: "ccache g++"
        run: |
          cmake -B build-reldeb \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DPLATFORM=LINUX
          cmake --build build-reldeb --config RelWithDebInfo -j$(nproc)

      - name: Generate XLS Test Report
        if: always()
        run: |
          python3 tests/generate_xls_report.py test_report.xlsx

      - name: Generate Cppcheck XLS Report
        if: always()
        run: |
          if [ -f "cppcheck_report.xml" ]; then
            python3 tests/generate_cppcheck_report.py cppcheck_report.xml cppcheck_report.xlsx
          else
            echo "::warning:: Cppcheck XML report was not found. Excel report will not be generated."
          fi

      - name: Generate ASan & UBSan XLS Reports
        if: always()
        run: |
          if [ -d "build-sanitizers" ]; then
            python3 tests/generate_xls_report.py asan_report.xlsx build-sanitizers
            python3 tests/generate_xls_report.py ubsan_report.xlsx build-sanitizers
          else
            echo "::warning:: build-sanitizers directory not found. ASan & UBSan reports will not be generated."
          fi

      - name: Upload Test Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-execution-report
          path: test_report.xlsx
          if-no-files-found: warn

      - name: Upload Cppcheck Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-report
          path: cppcheck_report.xlsx
          if-no-files-found: warn

      - name: Upload ASan Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asan-report
          path: asan_report.xlsx
          if-no-files-found: warn

      - name: Upload UBSan Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ubsan-report
          path: ubsan_report.xlsx
          if-no-files-found: warn

  build-packages:
    name: Build & Package (${{ matrix.target }})
    runs-on: ${{ matrix.runs_on }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runs_on: ubuntu-latest
            os_name: linux
            bin_dir: build
            cmake_args: "-DPLATFORM=LINUX -DCMAKE_BUILD_TYPE=Release"
            artifact_name: NaikAVPlayer-linux-x64
            executable_name: NaikAVPlayer

          # Windows is built with the NATIVE MSVC toolchain on a Windows runner
          # (not MinGW cross-compiled on Ubuntu). MinGW PE binaries trip generic
          # antivirus heuristics (e.g. Kaspersky VHO:Trojan.Win32.Diztakun.gen);
          # MSVC output trips far fewer, supports Control Flow Guard, and is the
          # expected form for a Windows release.
          - target: windows-x86_64
            runs_on: windows-latest
            os_name: windows
            bin_dir: build/Release
            cmake_args: "-DPLATFORM=WINDOWS -DCMAKE_BUILD_TYPE=Release"
            artifact_name: NaikAVPlayer-windows-x64
            executable_name: NaikAVPlayer.exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies (Linux)
        if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev ccache

      - name: Setup Compiler Cache (ccache, Linux)
        if: matrix.os_name == 'linux'
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ matrix.target }}-ccache

      - name: Configure CMake
        run: |
          if [ "${{ matrix.os_name }}" = "linux" ]; then
            CC="ccache gcc" CXX="ccache g++" \
              cmake -B build ${{ matrix.cmake_args }} -DTREAT_WARNINGS_AS_ERRORS=ON
          else
            # No CC/CXX override: CMake selects the default Visual Studio
            # generator + MSVC toolchain on the Windows runner.
            cmake -B build ${{ matrix.cmake_args }} -DTREAT_WARNINGS_AS_ERRORS=ON
          fi

      - name: Build
        run: |
          cmake --build build --config Release --parallel

      - name: Validate Binary
        run: |
          BIN="${{ matrix.bin_dir }}/${{ matrix.executable_name }}"
          if [ ! -f "$BIN" ]; then
            echo "::error:: Expected binary not found at $BIN"
            exit 1
          fi
          if [ "${{ matrix.os_name }}" = "linux" ]; then
            echo "Running ldd on native binary..."
            ldd "$BIN" || true
            echo "Checking RELRO/BIND_NOW hardening..."
            readelf -d "$BIN" | grep -E 'BIND_NOW|FLAGS' || true
          else
            echo "Windows binary present:"
            ls -la "$BIN"
            file "$BIN" || true
          fi

      # OPTIONAL: Authenticode-sign the Windows .exe. This is the definitive fix
      # for antivirus / SmartScreen distrust of the unsigned binary. It runs only
      # when the signing secrets are configured, so it is a no-op until you add:
      #   secrets.WINDOWS_CERT_BASE64     - base64 of your code-signing .pfx
      #   secrets.WINDOWS_CERT_PASSWORD   - the .pfx password
      - name: Sign Windows Executable (optional)
        if: matrix.os_name == 'windows' && secrets.WINDOWS_CERT_BASE64 != ''
        shell: pwsh
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERT_BASE64))
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
                      Sort-Object FullName | Select-Object -Last 1
          & $signtool.FullName sign /fd SHA256 /f $pfx /p $env:WINDOWS_CERT_PASSWORD `
            /tr http://timestamp.digicert.com /td SHA256 `
            "${{ matrix.bin_dir }}/${{ matrix.executable_name }}"
          Remove-Item $pfx

      - name: Assemble Release Package
        run: |
          BIN_DIR="${{ matrix.bin_dir }}"
          mkdir -p package/licenses
          mkdir -p package/lib
          mkdir -p package/assets

          # Copy Binary
          cp "$BIN_DIR/${{ matrix.executable_name }}" package/

          # Copy Assets
          cp -r assets/* package/assets/

          # Copy Documentation
          cp README.md package/
          if [ -f "help.md" ]; then cp help.md package/; fi
          if [ -f "HELP.md" ]; then cp HELP.md package/; fi

          # Copy Project LICENSE
          cp LICENSE package/

          # Copy licenses/ directory and third-party license files
          if [ -d "licenses" ]; then
            cp -r licenses/* package/licenses/
          fi
          cp LICENSE package/licenses/
          if [ -f "thirdparty/ffmpeg/LICENSE.txt" ]; then
            cp thirdparty/ffmpeg/LICENSE.txt package/licenses/FFMPEG_LICENSE.txt
          fi

          # Ensure case-insensitive compatibility (both licenses/ and LICENSES/)
          cp -r package/licenses package/LICENSES

          # Copy runtime libraries. The CMake POST_BUILD step already places the
          # FFmpeg + SDL3 shared libs next to the freshly built binary.
          if [ "${{ matrix.os_name }}" = "windows" ]; then
            # MSVC build uses the static CRT (/MT), so NO MinGW libwinpthread and
            # NO VC++ redistributable are required - only the third-party DLLs.
            cp "$BIN_DIR"/*.dll package/ 2>/dev/null || true
          else
            cp "$BIN_DIR"/lib/*.so* package/lib/ 2>/dev/null || true
          fi

      - name: Verify Package Compliance
        run: |
          echo "Verifying release package contents..."

          if [ ! -f "package/${{ matrix.executable_name }}" ]; then
            echo "::error:: Package compliance check failed: Executable package/${{ matrix.executable_name }} is missing!"
            exit 1
          fi
          if [ ! -f "package/LICENSE" ]; then
            echo "::error:: Package compliance check failed: Project LICENSE is missing!"
            exit 1
          fi
          if [ ! -f "package/README.md" ] && [ ! -f "package/README" ]; then
            echo "::error:: Package compliance check failed: README is missing!"
            exit 1
          fi
          if [ ! -f "package/help.md" ] && [ ! -f "package/HELP.md" ]; then
            echo "::error:: Package compliance check failed: help.md / HELP.md documentation is missing!"
            exit 1
          fi
          if [ ! -d "package/licenses" ] || [ -z "$(ls -A package/licenses)" ]; then
            echo "::error:: Package compliance check failed: licenses/ directory is missing or empty!"
            exit 1
          fi
          if [ ! -d "package/LICENSES" ] || [ -z "$(ls -A package/LICENSES)" ]; then
            echo "::error:: Package compliance check failed: LICENSES/ directory is missing or empty!"
            exit 1
          fi

          echo "Release package verification passed successfully! Contents:"
          ls -la package/
          echo "Package licenses folder:"
          ls -la package/licenses/

      - name: Upload Artifact
        if: startsWith(github.ref, 'refs/heads/release')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: package/
          if-no-files-found: error
