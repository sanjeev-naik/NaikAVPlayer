name: Release

on:
  push:
    tags: [ "v*" ]

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows Package (MinGW cross-compile)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Cross-Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 ccache nasm yasm

      - name: Cache FFmpeg Build (Windows)
        id: cache-ffmpeg-windows
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/thirdparty/ffmpeg
          key: ${{ runner.os }}-ffmpeg-8.1-ce3c09c101-mingw-x64-v1

      - name: Build FFmpeg from source (Windows)
        if: steps.cache-ffmpeg-windows.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
          cd ffmpeg-src
          git checkout ce3c09c101
          ./configure \
            --prefix=${{ github.workspace }}/thirdparty/ffmpeg \
            --enable-shared \
            --disable-static \
            --disable-programs \
            --disable-doc \
            --disable-avdevice \
            --disable-avfilter \
            --enable-cross-compile \
            --cross-prefix=x86_64-w64-mingw32- \
            --arch=x86_64 \
            --target-os=mingw32 \
            --cc=x86_64-w64-mingw32-gcc \
            --cxx=x86_64-w64-mingw32-g++
          make -j$(nproc)
          make install

      - name: Setup Compiler Cache (ccache)
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: windows-mingw-ccache-release

      - name: Configure & Build
        run: |
          cmake -B build-windows \
            -DPLATFORM=WINDOWS \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc \
            -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++ \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_FFMPEG_AUTO_DOWNLOAD=OFF
          cmake --build build-windows --config Release -j$(nproc)

      - name: Package
        run: |
          PKG=NaikAVPlayer-${{ github.ref_name }}-windows-x64
          mkdir -p $PKG
          cp build-windows/NaikAVPlayer.exe build-windows/*.dll $PKG/
          # MinGW runtime: copy standard C++ and thread libraries to bundle them
          find /usr/x86_64-w64-mingw32 /usr/lib/gcc/x86_64-w64-mingw32 \
            \( -name "libwinpthread-1.dll" -o -name "libstdc++-6.dll" -o -name "libgcc_s_*.dll" \) \
            -exec cp {} $PKG/ \; 2>/dev/null || true
          cp -r assets $PKG/
          rm -f $PKG/assets/hd_test_video_with_audio.mp4 $PKG/assets/screenshot.png
          cp -r licenses $PKG/
          cp LICENSE README.md $PKG/
          zip -r $PKG.zip $PKG

      - name: Verify DLL closure
        run: |
          PKG=NaikAVPlayer-${{ github.ref_name }}-windows-x64
          missing=0
          for dll in $(x86_64-w64-mingw32-objdump -p $PKG/NaikAVPlayer.exe | awk '/DLL Name/{print $3}'); do
            case "$dll" in
              KERNEL32.dll|USER32.dll|GDI32.dll|SHELL32.dll|ADVAPI32.dll|ole32.dll|OLEAUT32.dll|msvcrt.dll|WS2_32.dll|bcrypt.dll|IMM32.dll|SETUPAPI.dll|VERSION.dll|WINMM.dll|uuid.dll|comdlg32.dll|SHLWAPI.dll|dwmapi.dll|CRYPT32.dll|Secur32.dll)
                ;;
              *)
                if [ ! -f "$PKG/$dll" ]; then
                  echo "::error::Missing dependent DLL in package: $dll"
                  missing=1
                fi
                ;;
            esac
          done
          [ $missing -eq 0 ] && echo "All non-system DLL dependencies are bundled."
          exit $missing

      - uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: NaikAVPlayer-*.zip

  build-linux:
    name: Linux Package
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libva-dev \
            libvdpau-dev \
            libdrm-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            wayland-protocols \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxss-dev \
            libgbm-dev \
            libgles-dev \
            libegl-dev \
            libdbus-1-dev \
            libpulse-dev \
            libasound2-dev \
            nasm \
            yasm \
            ccache

      # Pinned to the exact same FFmpeg commit/version (n8.1.2, ce3c09c101)
      # as every other leg of this pipeline and as the CMake auto-download
      # path used by local developer builds. Previously this job linked
      # against Ubuntu 22.04's apt libavcodec-dev (FFmpeg 4.4.2) while
      # shipping a release tarball with NO FFmpeg at all, relying on
      # whatever the target machine happened to already have installed.
      - name: Cache FFmpeg Build (Linux x64)
        id: cache-ffmpeg-linux-x64
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/thirdparty/ffmpeg
          key: ${{ runner.os }}-ffmpeg-8.1-ce3c09c101-linux-x64-v1

      - name: Build FFmpeg from source (Linux x64)
        if: steps.cache-ffmpeg-linux-x64.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
          cd ffmpeg-src
          git checkout ce3c09c101
          ./configure \
            --prefix=${{ github.workspace }}/thirdparty/ffmpeg \
            --enable-shared \
            --disable-static \
            --disable-doc \
            --disable-avdevice \
            --disable-avfilter \
            --enable-libdrm \
            --enable-v4l2-m2m
          grep -q "#define CONFIG_V4L2_M2M 1" config.h || { echo "::error::FFmpeg configured WITHOUT V4L2 M2M support"; exit 1; }
          grep -q "#define CONFIG_LIBDRM 1" config.h || { echo "::error::FFmpeg configured WITHOUT libdrm/DRM PRIME support"; exit 1; }
          make -j$(nproc)
          make install

      - name: Setup Compiler Cache (ccache)
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: linux-gcc-ccache-release

      - name: Configure & Build
        run: |
          cmake -B build -DPLATFORM=LINUX -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_FFMPEG_AUTO_DOWNLOAD=OFF \
            -DSDL_WAYLAND=ON -DSDL_X11=ON -DSDL_KMSDRM=ON
          cmake --build build --config Release -j$(nproc)

      - name: Collect CI Diagnostics
        if: always()
        run: |
          mkdir -p diagnostics-linux-x64
          echo "=== Compiler Version ===" > diagnostics-linux-x64/compiler_version.txt
          gcc --version >> diagnostics-linux-x64/compiler_version.txt 2>&1
          g++ --version >> diagnostics-linux-x64/compiler_version.txt 2>&1

          echo "=== CMake Version ===" > diagnostics-linux-x64/cmake_version.txt
          cmake --version >> diagnostics-linux-x64/cmake_version.txt 2>&1

          FFMPEG_BIN="thirdparty/ffmpeg/bin/ffmpeg"
          if [ ! -x "$FFMPEG_BIN" ]; then FFMPEG_BIN="ffmpeg"; fi

          echo "=== FFmpeg Version ($FFMPEG_BIN) ===" > diagnostics-linux-x64/ffmpeg_version.txt
          "$FFMPEG_BIN" -version >> diagnostics-linux-x64/ffmpeg_version.txt 2>&1 || true

          echo "=== pkg-config versions ===" > diagnostics-linux-x64/pkg_config_versions.txt
          export PKG_CONFIG_PATH="${{ github.workspace }}/thirdparty/ffmpeg/lib/pkgconfig:$(find build -name "*.pc" -exec dirname {} \; | tr '\n' ':'):$PKG_CONFIG_PATH"
          pkg-config --modversion libavcodec >> diagnostics-linux-x64/pkg_config_versions.txt 2>&1 || true
          pkg-config --modversion libavformat >> diagnostics-linux-x64/pkg_config_versions.txt 2>&1 || true
          pkg-config --modversion libavutil >> diagnostics-linux-x64/pkg_config_versions.txt 2>&1 || true
          pkg-config --modversion sdl3 >> diagnostics-linux-x64/pkg_config_versions.txt 2>&1 || true

          echo "=== FFmpeg hwaccels ===" > diagnostics-linux-x64/ffmpeg_hwaccels.txt
          "$FFMPEG_BIN" -hwaccels >> diagnostics-linux-x64/ffmpeg_hwaccels.txt 2>&1 || true

          echo "=== FFmpeg decoders (v4l2m2m / drm filtered) ===" > diagnostics-linux-x64/ffmpeg_decoders.txt
          "$FFMPEG_BIN" -decoders >> diagnostics-linux-x64/ffmpeg_decoders.txt 2>&1 || true
          echo "=== grep v4l2m2m ===" >> diagnostics-linux-x64/ffmpeg_decoders.txt
          "$FFMPEG_BIN" -decoders 2>/dev/null | grep -i v4l2m2m >> diagnostics-linux-x64/ffmpeg_decoders.txt || echo "(none found)" >> diagnostics-linux-x64/ffmpeg_decoders.txt

          if [ -f build/NaikAVPlayer ]; then
            echo "=== ldd NaikAVPlayer ===" > diagnostics-linux-x64/ldd_NaikAVPlayer.txt
            ldd build/NaikAVPlayer >> diagnostics-linux-x64/ldd_NaikAVPlayer.txt 2>&1 || true

            echo "=== readelf NaikAVPlayer ===" > diagnostics-linux-x64/readelf_NaikAVPlayer.txt
            readelf -d build/NaikAVPlayer >> diagnostics-linux-x64/readelf_NaikAVPlayer.txt 2>&1 || true

            echo "=== objdump NaikAVPlayer ===" > diagnostics-linux-x64/objdump_NaikAVPlayer.txt
            objdump -p build/NaikAVPlayer >> diagnostics-linux-x64/objdump_NaikAVPlayer.txt 2>&1 || true
          fi

      - name: Package
        run: |
          PKG=NaikAVPlayer-${{ github.ref_name }}-linux-x64
          mkdir -p $PKG/lib
          cp build/NaikAVPlayer $PKG/
          # Bundle the in-tree built SDL3 shared library; binary finds it via $ORIGIN/lib RPATH
          find build -name "libSDL3.so*" -exec cp -P {} $PKG/lib/ \;
          # Bundle the exact FFmpeg .so's this binary was compiled/linked
          # against (built from source, pinned commit - see above) so the
          # release cannot silently pick up a different FFmpeg from the
          # target system.
          cp -P thirdparty/ffmpeg/lib/libav*.so* thirdparty/ffmpeg/lib/libsw*.so* $PKG/lib/
          cp -r assets $PKG/
          rm -f $PKG/assets/hd_test_video_with_audio.mp4 $PKG/assets/screenshot.png
          cp -r licenses $PKG/
          cp LICENSE README.md $PKG/

      - name: Verify Package Closure
        run: |
          PKG=NaikAVPlayer-${{ github.ref_name }}-linux-x64
          echo "=== Verifying RPATH/RUNPATH ==="
          RUNPATH_CHECK=$(readelf -d "$PKG/NaikAVPlayer" | grep -E "R(UN)?PATH")
          echo "$RUNPATH_CHECK"
          if ! echo "$RUNPATH_CHECK" | grep -q '\$ORIGIN/lib'; then
            echo "::error::RUNPATH is not set to \$ORIGIN/lib!"
            exit 1
          fi

          echo "=== Verifying Bundled Shared Libraries ==="
          ls -l "$PKG/lib/"

          REQUIRED_LIBS=("libSDL3.so" "libavcodec.so" "libavformat.so" "libavutil.so" "libswscale.so" "libswresample.so")
          for lib in "${REQUIRED_LIBS[@]}"; do
            if ! ls "$PKG/lib/" | grep -q "$lib"; then
              echo "::error::Missing bundled library: $lib"
              exit 1
            fi
          done

          echo "=== Verifying Binary Dependencies ==="
          NEEDED_LIBS=$(readelf -d "$PKG/NaikAVPlayer" | grep NEEDED | awk -F'[' '{print $2}' | awk -F']' '{print $1}')
          echo "Needed libraries:"
          echo "$NEEDED_LIBS"

          # Every FFmpeg/SDL3 NEEDED entry must resolve inside our bundled
          # lib/ dir via the $ORIGIN/lib RPATH.
          for needed in $NEEDED_LIBS; do
            case "$needed" in
              libSDL3*|libavcodec*|libavformat*|libavutil*|libswscale*|libswresample*)
                if [ ! -f "$PKG/lib/$needed" ]; then
                  resolved_base=$(echo "$needed" | sed -E 's/\.so\..*/.so/')
                  if ! ls "$PKG/lib/" | grep -q "$resolved_base"; then
                    echo "::error::Binary needs $needed but it is not in lib/"
                    exit 1
                  fi
                fi
                ;;
            esac
          done
          echo "Package closure verification passed!"

      - name: Create Linux Tarball Package
        run: |
          PKG=NaikAVPlayer-${{ github.ref_name }}-linux-x64
          tar czf $PKG.tar.gz $PKG

      - uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: NaikAVPlayer-*.tar.gz

      - name: Upload CI Diagnostics Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-linux-x64
          path: diagnostics-linux-x64/

  build-linux-aarch64:
    name: Linux aarch64 Package (ARM64 Cross-Compilation)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Cross-Compiler and Dependencies
        run: |
          sudo dpkg --add-architecture arm64

          # Restrict existing amd64 list sources to [arch=amd64]. Matched
          # scheme-agnostically (not "http|https|mirror:") because GitHub's
          # ubuntu-22.04 runner sources its default lists via
          # "deb mirror+file:/etc/apt/apt-mirrors.txt ...", and "mirror+file:"
          # doesn't match a literal "mirror:" alternative - that gap left the
          # default lists unrestricted, so apt-get update went on to request
          # arm64 indexes from security.ubuntu.com (which doesn't mirror
          # arm64/ports packages at all) and failed with 404s.
          if [ -f /etc/apt/sources.list ]; then
            sudo sed -i -E 's/^deb([[:space:]]+)([^[])/deb\1[arch=amd64] \2/' /etc/apt/sources.list
          fi
          if [ -d /etc/apt/sources.list.d ]; then
            find /etc/apt/sources.list.d/ -type f -name "*.list" -exec sudo sed -i -E 's/^deb([[:space:]]+)([^[])/deb\1[arch=amd64] \2/' {} +
          fi

          # Restrict existing amd64 DEB822 sources to Architectures: amd64
          sudo python3 -c '
          import glob, os
          for p in glob.glob("/etc/apt/sources.list.d/*.sources"):
              with open(p, "r") as f:
                  lines = f.readlines()
              paragraphs = []
              current_paragraph = []
              for line in lines:
                  stripped = line.strip()
                  if not stripped:
                      if current_paragraph:
                          paragraphs.append(current_paragraph)
                          current_paragraph = []
                      paragraphs.append(line)
                  else:
                      current_paragraph.append(line)
              if current_paragraph:
                  paragraphs.append(current_paragraph)
              new_content = []
              modified = False
              for item in paragraphs:
                  if isinstance(item, list):
                      has_suites = any(l.strip().startswith("Suites:") for l in item)
                      has_arch = any(l.strip().startswith("Architectures:") for l in item)
                      if has_suites and not has_arch:
                          for idx, l in enumerate(item):
                              if l.strip().startswith("Suites:"):
                                  indent = l[:len(l) - len(l.lstrip())]
                                  item.insert(idx, f"{indent}Architectures: amd64\n")
                                  modified = True
                                  break
                      new_content.extend(item)
                  else:
                      new_content.append(item)
              if modified:
                  with open(p, "w") as f:
                      f.writelines(new_content)
          '

          # Add arm64 sources
          sudo tee /etc/apt/sources.list.d/arm64.list <<EOF
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ $(lsb_release -cs) main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ $(lsb_release -cs)-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ $(lsb_release -cs)-security main restricted universe multiverse
          EOF

          sudo apt-get update
          sudo apt-get install -y \
            g++-aarch64-linux-gnu \
            libgtk-3-dev:arm64 \
            libasound2-dev:arm64 \
            libxss-dev:arm64 \
            libva-dev:arm64 \
            libvdpau-dev:arm64 \
            libdrm-dev:arm64 \
            libudev-dev:arm64 \
            libwayland-dev:arm64 \
            libxkbcommon-dev:arm64 \
            wayland-protocols \
            libx11-dev:arm64 \
            libxrandr-dev:arm64 \
            libxcursor-dev:arm64 \
            libxext-dev:arm64 \
            libxfixes-dev:arm64 \
            libxi-dev:arm64 \
            libgbm-dev:arm64 \
            libgles-dev:arm64 \
            libegl-dev:arm64 \
            libdbus-1-dev:arm64 \
            libpulse-dev:arm64 \
            qemu-user-static \
            ccache

      # Pinned, source-built, V4L2M2M+DRM-enabled FFmpeg for aarch64 - see the
      # matching step in ci.yml for the full rationale. This replaces
      # `ffmpeg:arm64` from Ubuntu ports (FFmpeg 4.4.2, generic config, not
      # guaranteed to have V4L2 M2M / DRM PRIME compiled in), which is the
      # primary reason the previously-released Raspberry Pi build could work
      # locally but show a blank screen on hardware decode / hang on "Show
      # Info" when downloaded from a GitHub Release.
      - name: Cache FFmpeg Build (Linux aarch64)
        id: cache-ffmpeg-linux-aarch64
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/thirdparty/ffmpeg
          key: ${{ runner.os }}-ffmpeg-8.1-ce3c09c101-linux-aarch64-v1

      - name: Build FFmpeg from source (Linux aarch64 cross-compile)
        if: steps.cache-ffmpeg-linux-aarch64.outputs.cache-hit != 'true'
        env:
          PKG_CONFIG_LIBDIR: "/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig"
          PKG_CONFIG_SYSROOT_DIR: "/"
        run: |
          git clone https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
          cd ffmpeg-src
          git checkout ce3c09c101
          ./configure \
            --prefix=${{ github.workspace }}/thirdparty/ffmpeg \
            --enable-shared \
            --disable-static \
            --disable-doc \
            --disable-avdevice \
            --disable-avfilter \
            --enable-cross-compile \
            --cross-prefix=aarch64-linux-gnu- \
            --arch=aarch64 \
            --target-os=linux \
            --cc=aarch64-linux-gnu-gcc \
            --cxx=aarch64-linux-gnu-g++ \
            --pkg-config=pkg-config \
            --enable-libdrm \
            --enable-v4l2-m2m
          grep -q "#define CONFIG_V4L2_M2M 1" config.h || { echo "::error::FFmpeg (aarch64) configured WITHOUT V4L2 M2M support"; exit 1; }
          grep -q "#define CONFIG_LIBDRM 1" config.h || { echo "::error::FFmpeg (aarch64) configured WITHOUT libdrm/DRM PRIME support"; exit 1; }
          make -j$(nproc)
          make install

      - name: Setup Compiler Cache (ccache)
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: linux-aarch64-ccache-release

      - name: Configure CMake
        env:
          CC: "ccache aarch64-linux-gnu-gcc"
          CXX: "ccache aarch64-linux-gnu-g++"
          PKG_CONFIG_LIBDIR: "/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig"
          PKG_CONFIG_SYSROOT_DIR: "/"
        run: |
          cmake -B build-linux-aarch64 \
            -DPLATFORM=LINUX \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DTREAT_WARNINGS_AS_ERRORS=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_FFMPEG_AUTO_DOWNLOAD=OFF \
            -DSDL_WAYLAND=ON \
            -DSDL_X11=ON \
            -DSDL_KMSDRM=ON

      - name: Build
        run: |
          cmake --build build-linux-aarch64 --config Release -j$(nproc)

      - name: Collect CI Diagnostics
        if: always()
        run: |
          mkdir -p diagnostics-linux-aarch64
          echo "=== Compiler Version ===" > diagnostics-linux-aarch64/compiler_version.txt
          aarch64-linux-gnu-gcc --version >> diagnostics-linux-aarch64/compiler_version.txt 2>&1
          aarch64-linux-gnu-g++ --version >> diagnostics-linux-aarch64/compiler_version.txt 2>&1

          echo "=== CMake Version ===" > diagnostics-linux-aarch64/cmake_version.txt
          cmake --version >> diagnostics-linux-aarch64/cmake_version.txt 2>&1

          # Executed transparently via the qemu-user-static binfmt_misc
          # handler installed above, so this reflects the real cross-compiled
          # binary, not a guess from headers.
          FFMPEG_BIN="thirdparty/ffmpeg/bin/ffmpeg"

          echo "=== FFmpeg Version (qemu-aarch64: $FFMPEG_BIN) ===" > diagnostics-linux-aarch64/ffmpeg_version.txt
          "$FFMPEG_BIN" -version >> diagnostics-linux-aarch64/ffmpeg_version.txt 2>&1 || echo "(qemu execution unavailable)" >> diagnostics-linux-aarch64/ffmpeg_version.txt

          echo "=== pkg-config versions ===" > diagnostics-linux-aarch64/pkg_config_versions.txt
          export PKG_CONFIG_LIBDIR="/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig"
          export PKG_CONFIG_PATH="${{ github.workspace }}/thirdparty/ffmpeg/lib/pkgconfig:$(find build-linux-aarch64 -name "*.pc" -exec dirname {} \; | tr '\n' ':')"
          pkg-config --modversion libavcodec >> diagnostics-linux-aarch64/pkg_config_versions.txt 2>&1 || true
          pkg-config --modversion libavformat >> diagnostics-linux-aarch64/pkg_config_versions.txt 2>&1 || true
          pkg-config --modversion libavutil >> diagnostics-linux-aarch64/pkg_config_versions.txt 2>&1 || true
          pkg-config --modversion sdl3 >> diagnostics-linux-aarch64/pkg_config_versions.txt 2>&1 || true

          echo "=== FFmpeg hwaccels ===" > diagnostics-linux-aarch64/ffmpeg_hwaccels.txt
          "$FFMPEG_BIN" -hwaccels >> diagnostics-linux-aarch64/ffmpeg_hwaccels.txt 2>&1 || echo "(qemu execution unavailable)" >> diagnostics-linux-aarch64/ffmpeg_hwaccels.txt

          echo "=== FFmpeg decoders (v4l2m2m / drm filtered) ===" > diagnostics-linux-aarch64/ffmpeg_decoders.txt
          "$FFMPEG_BIN" -decoders >> diagnostics-linux-aarch64/ffmpeg_decoders.txt 2>&1 || echo "(qemu execution unavailable)" >> diagnostics-linux-aarch64/ffmpeg_decoders.txt
          echo "=== grep v4l2m2m ===" >> diagnostics-linux-aarch64/ffmpeg_decoders.txt
          "$FFMPEG_BIN" -decoders 2>/dev/null | grep -i v4l2m2m >> diagnostics-linux-aarch64/ffmpeg_decoders.txt || echo "(none found / qemu unavailable)" >> diagnostics-linux-aarch64/ffmpeg_decoders.txt

          if [ -f build-linux-aarch64/NaikAVPlayer ]; then
            echo "=== ldd NaikAVPlayer ===" > diagnostics-linux-aarch64/ldd_NaikAVPlayer.txt
            aarch64-linux-gnu-readelf -d build-linux-aarch64/NaikAVPlayer | grep NEEDED >> diagnostics-linux-aarch64/ldd_NaikAVPlayer.txt 2>&1 || true

            echo "=== readelf NaikAVPlayer ===" > diagnostics-linux-aarch64/readelf_NaikAVPlayer.txt
            aarch64-linux-gnu-readelf -d build-linux-aarch64/NaikAVPlayer >> diagnostics-linux-aarch64/readelf_NaikAVPlayer.txt 2>&1 || true

            echo "=== objdump NaikAVPlayer ===" > diagnostics-linux-aarch64/objdump_NaikAVPlayer.txt
            aarch64-linux-gnu-objdump -p build-linux-aarch64/NaikAVPlayer >> diagnostics-linux-aarch64/objdump_NaikAVPlayer.txt 2>&1 || true
          fi

      - name: Package
        run: |
          PKG=NaikAVPlayer-${{ github.ref_name }}-linux-aarch64
          mkdir -p $PKG/lib
          cp build-linux-aarch64/NaikAVPlayer $PKG/
          find build-linux-aarch64 -name "libSDL3.so*" -exec cp -P {} $PKG/lib/ \;
          # Bundle the exact (aarch64, V4L2M2M+DRM-enabled) FFmpeg .so's this
          # binary was compiled/linked against.
          cp -P thirdparty/ffmpeg/lib/libav*.so* thirdparty/ffmpeg/lib/libsw*.so* $PKG/lib/
          cp -r assets $PKG/
          rm -f $PKG/assets/hd_test_video_with_audio.mp4 $PKG/assets/screenshot.png
          cp -r licenses $PKG/
          cp LICENSE README.md $PKG/

      - name: Verify Package Closure
        run: |
          PKG=NaikAVPlayer-${{ github.ref_name }}-linux-aarch64
          echo "=== Verifying RPATH/RUNPATH ==="
          RUNPATH_CHECK=$(aarch64-linux-gnu-readelf -d "$PKG/NaikAVPlayer" | grep -E "R(UN)?PATH")
          echo "$RUNPATH_CHECK"
          if ! echo "$RUNPATH_CHECK" | grep -q '\$ORIGIN/lib'; then
            echo "::error::RUNPATH is not set to \$ORIGIN/lib!"
            exit 1
          fi

          echo "=== Verifying Bundled Shared Libraries ==="
          ls -l "$PKG/lib/"

          REQUIRED_LIBS=("libSDL3.so" "libavcodec.so" "libavformat.so" "libavutil.so" "libswscale.so" "libswresample.so")
          for lib in "${REQUIRED_LIBS[@]}"; do
            if ! ls "$PKG/lib/" | grep -q "$lib"; then
              echo "::error::Missing bundled library: $lib"
              exit 1
            fi
          done

          echo "=== Verifying Binary Dependencies ==="
          NEEDED_LIBS=$(aarch64-linux-gnu-readelf -d "$PKG/NaikAVPlayer" | grep NEEDED | awk -F'[' '{print $2}' | awk -F']' '{print $1}')
          echo "Needed libraries:"
          echo "$NEEDED_LIBS"

          # Every FFmpeg/SDL3 NEEDED entry must resolve inside our bundled
          # lib/ dir via the $ORIGIN/lib RPATH.
          for needed in $NEEDED_LIBS; do
            case "$needed" in
              libSDL3*|libavcodec*|libavformat*|libavutil*|libswscale*|libswresample*)
                if [ ! -f "$PKG/lib/$needed" ]; then
                  resolved_base=$(echo "$needed" | sed -E 's/\.so\..*/.so/')
                  if ! ls "$PKG/lib/" | grep -q "$resolved_base"; then
                    echo "::error::Binary needs $needed but it is not in lib/"
                    exit 1
                  fi
                fi
                ;;
            esac
          done
          echo "Package closure verification passed!"

      - name: Create Linux Tarball Package
        run: |
          PKG=NaikAVPlayer-${{ github.ref_name }}-linux-aarch64
          tar czf $PKG.tar.gz $PKG

      - uses: actions/upload-artifact@v4
        with:
          name: linux-aarch64-package
          path: NaikAVPlayer-*.tar.gz

      - name: Upload CI Diagnostics Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-linux-aarch64
          path: diagnostics-linux-aarch64/

  publish:
    name: Create GitHub Release
    needs: [build-windows, build-linux, build-linux-aarch64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            NaikAVPlayer-*.zip
            NaikAVPlayer-*.tar.gz
          generate_release_notes: true
          body: |
            ## Downloads
            - **Windows (x64):** self-contained — extract and run `NaikAVPlayer.exe`. All FFmpeg/SDL3/C++ runtime DLLs are bundled.
            - **Linux (x64):** self-contained — extract and run `NaikAVPlayer`. FFmpeg (with V4L2 M2M + DRM PRIME hardware decode support) and SDL3 are bundled in `lib/`.
            - **Linux (aarch64, e.g. Raspberry Pi 4/5):** self-contained — extract and run `NaikAVPlayer`. FFmpeg (built from source with V4L2 M2M + DRM PRIME hardware decode support) and SDL3 are bundled in `lib/`; no system FFmpeg install required or used.