name: Release

on:
  push:
    tags: [ "v*" ]

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows Package (MinGW cross-compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cross-Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 ffmpeg

      - name: Configure & Build
        run: |
          cmake -B build-windows \
            -DPLATFORM=WINDOWS \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc \
            -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++ \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build-windows --config Release -j$(nproc)

      - name: Package
        run: |
          mkdir -p NaikAVPlayer-${{ github.ref_name }}-windows-x64
          cp build-windows/NaikAVPlayer.exe build-windows/*.dll \
             NaikAVPlayer-${{ github.ref_name }}-windows-x64/
          cp -r build-windows/assets NaikAVPlayer-${{ github.ref_name }}-windows-x64/
          cp LICENSE README.md NaikAVPlayer-${{ github.ref_name }}-windows-x64/
          zip -r NaikAVPlayer-${{ github.ref_name }}-windows-x64.zip \
             NaikAVPlayer-${{ github.ref_name }}-windows-x64

      - uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: NaikAVPlayer-*.zip

  build-linux:
    name: Linux Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libavcodec-dev libavformat-dev \
            libavutil-dev libswscale-dev libswresample-dev libgtk-3-dev

      - name: Configure & Build
        run: |
          cmake -B build -DPLATFORM=LINUX -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j$(nproc)

      - name: Package
        run: |
          mkdir -p NaikAVPlayer-${{ github.ref_name }}-linux-x64
          cp build/NaikAVPlayer NaikAVPlayer-${{ github.ref_name }}-linux-x64/
          cp -r assets NaikAVPlayer-${{ github.ref_name }}-linux-x64/
          cp LICENSE README.md NaikAVPlayer-${{ github.ref_name }}-linux-x64/
          tar czf NaikAVPlayer-${{ github.ref_name }}-linux-x64.tar.gz \
             NaikAVPlayer-${{ github.ref_name }}-linux-x64

      - uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: NaikAVPlayer-*.tar.gz

  publish:
    name: Create GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            NaikAVPlayer-*.zip
            NaikAVPlayer-*.tar.gz
          generate_release_notes: true