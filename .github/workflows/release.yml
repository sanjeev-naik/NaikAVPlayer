name: Release

on:
  push:
    tags: [ "v*" ]

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows Package (MinGW cross-compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cross-Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Cache FFmpeg Build (Windows)
        id: cache-ffmpeg-windows
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/thirdparty/ffmpeg
          key: ${{ runner.os }}-ffmpeg-8.1-ce3c09c101-mingw-x64-v1

      - name: Build FFmpeg from source (Windows)
        if: steps.cache-ffmpeg-windows.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
          cd ffmpeg-src
          git checkout ce3c09c101
          ./configure \
            --prefix=${{ github.workspace }}/thirdparty/ffmpeg \
            --enable-shared \
            --disable-static \
            --disable-programs \
            --disable-doc \
            --disable-avdevice \
            --disable-avfilter \
            --enable-cross-compile \
            --cross-prefix=x86_64-w64-mingw32- \
            --arch=x86_64 \
            --target-os=mingw32 \
            --cc=x86_64-w64-mingw32-gcc \
            --cxx=x86_64-w64-mingw32-g++
          make -j$(nproc)
          make install

      - name: Configure & Build
        run: |
          cmake -B build-windows \
            -DPLATFORM=WINDOWS \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc \
            -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++ \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build-windows --config Release -j$(nproc)

      - name: Package
        run: |
          PKG=NaikAVPlayer-${{ github.ref_name }}-windows-x64
          mkdir -p $PKG
          cp build-windows/NaikAVPlayer.exe build-windows/*.dll $PKG/
          # MinGW runtime: winpthread is not covered by -static-libgcc/-static-libstdc++
          find /usr/x86_64-w64-mingw32 /usr/lib/gcc/x86_64-w64-mingw32 \
            -name "libwinpthread-1.dll" -exec cp {} $PKG/ \; 2>/dev/null || true
          cp -r assets $PKG/
          rm -f $PKG/assets/hd_test_video_with_audio.mp4 $PKG/assets/screenshot.png
          cp -r licenses $PKG/
          cp LICENSE README.md $PKG/
          zip -r $PKG.zip $PKG


      - name: Verify DLL closure
        run: |
          PKG=NaikAVPlayer-${{ github.ref_name }}-windows-x64
          missing=0
          for dll in $(x86_64-w64-mingw32-objdump -p $PKG/NaikAVPlayer.exe | awk '/DLL Name/{print $3}'); do
            case "$dll" in
              KERNEL32.dll|USER32.dll|GDI32.dll|SHELL32.dll|ADVAPI32.dll|ole32.dll|OLEAUT32.dll|msvcrt.dll|WS2_32.dll|bcrypt.dll|IMM32.dll|SETUPAPI.dll|VERSION.dll|WINMM.dll|uuid.dll|comdlg32.dll|SHLWAPI.dll|dwmapi.dll|CRYPT32.dll|Secur32.dll)
                ;;
              *)
                if [ ! -f "$PKG/$dll" ]; then
                  echo "::error::Missing dependent DLL in package: $dll"
                  missing=1
                fi
                ;;
            esac
          done
          [ $missing -eq 0 ] && echo "All non-system DLL dependencies are bundled."
          exit $missing

      - uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: NaikAVPlayer-*.zip

  build-linux:
    name: Linux Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libva-dev libvdpau-dev libdrm-dev libudev-dev

      # FFmpeg is NOT built from source here. CMake's ENABLE_FFMPEG_AUTO_DOWNLOAD
      # (ON by default) fetches the SHA256-pinned BtbN linux64 shared build --
      # the exact same libraries a local build links and bundles, so release
      # packages are bit-identical to local builds. The old source-build step
      # was broken (--enable-udev is not a valid FFmpeg configure option) and
      # could only ever ship a stale, unreproducible actions/cache blob.

      - name: Configure & Build
        run: |
          cmake -B build -DPLATFORM=LINUX -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j$(nproc)

      - name: Package
        run: |
          PKG=NaikAVPlayer-${{ github.ref_name }}-linux-x64
          mkdir -p $PKG/lib
          cp build/NaikAVPlayer $PKG/
          # Bundle the in-tree built SDL3 shared library; binary finds it via $ORIGIN/lib RPATH
          find build -name "libSDL3.so*" -exec cp -P {} $PKG/lib/ \;
          if [ -d thirdparty/ffmpeg/lib ]; then
            cp -P thirdparty/ffmpeg/lib/libav*.so* thirdparty/ffmpeg/lib/libsw*.so* $PKG/lib/
          fi
          cp -r assets $PKG/
          rm -f $PKG/assets/hd_test_video_with_audio.mp4 $PKG/assets/screenshot.png
          cp -r licenses $PKG/
          cp LICENSE README.md $PKG/
          tar czf $PKG.tar.gz $PKG


      - name: Verify shared library resolution
        run: |
          PKG=NaikAVPlayer-${{ github.ref_name }}-linux-x64
          ls -la $PKG/lib/
          cd $PKG
          if ldd ./NaikAVPlayer | grep "not found"; then
            echo "::error::Unresolved shared libraries in packaged binary"
            exit 1
          fi
          ldd ./NaikAVPlayer | grep -E "libSDL3|libav" || true
          echo "All shared libraries resolve (FFmpeg and SDL3 bundled)."

      - uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: NaikAVPlayer-*.tar.gz

  build-linux-aarch64:
    name: Linux aarch64 Package (ARM64 Cross-Compilation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cross-Compiler and Dependencies
        run: |
          sudo dpkg --add-architecture arm64

          # Restrict existing amd64 list sources to [arch=amd64]
          if [ -f /etc/apt/sources.list ]; then
            sudo sed -i -E 's/deb[[:space:]]+(http|https|mirror):/deb [arch=amd64] \1:/g' /etc/apt/sources.list
          fi
          if [ -d /etc/apt/sources.list.d ]; then
            find /etc/apt/sources.list.d/ -type f -name "*.list" -exec sudo sed -i -E 's/deb[[:space:]]+(http|https|mirror):/deb [arch=amd64] \1:/g' {} +
          fi

          # Restrict existing amd64 DEB822 sources to Architectures: amd64
          sudo python3 -c '
          import glob, os
          for p in glob.glob("/etc/apt/sources.list.d/*.sources"):
              with open(p, "r") as f:
                  lines = f.readlines()
              paragraphs = []
              current_paragraph = []
              for line in lines:
                  stripped = line.strip()
                  if not stripped:
                      if current_paragraph:
                          paragraphs.append(current_paragraph)
                          current_paragraph = []
                      paragraphs.append(line)
                  else:
                      current_paragraph.append(line)
              if current_paragraph:
                  paragraphs.append(current_paragraph)
              new_content = []
              modified = False
              for item in paragraphs:
                  if isinstance(item, list):
                      has_suites = any(l.strip().startswith("Suites:") for l in item)
                      has_arch = any(l.strip().startswith("Architectures:") for l in item)
                      if has_suites and not has_arch:
                          for idx, l in enumerate(item):
                              if l.strip().startswith("Suites:"):
                                  indent = l[:len(l) - len(l.lstrip())]
                                  item.insert(idx, f"{indent}Architectures: amd64\n")
                                  modified = True
                                  break
                      new_content.extend(item)
                  else:
                      new_content.append(item)
              if modified:
                  with open(p, "w") as f:
                      f.writelines(new_content)
          '

          # Add arm64 sources
          sudo tee /etc/apt/sources.list.d/arm64.list <<EOF
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ $(lsb_release -cs) main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ $(lsb_release -cs)-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ $(lsb_release -cs)-security main restricted universe multiverse
          EOF

          sudo apt-get update
          sudo apt-get install -y \
            g++-aarch64-linux-gnu \
            libgtk-3-dev:arm64 \
            libasound2-dev:arm64 \
            libxss-dev:arm64 \
            libva-dev:arm64 \
            libvdpau-dev:arm64 \
            libdrm-dev:arm64 \
            libudev-dev:arm64 \
            ccache

      # FFmpeg is NOT cross-built from source here. CMake's auto-download picks
      # the SHA256-pinned BtbN linuxarm64 build (CMAKE_SYSTEM_PROCESSOR=aarch64
      # selects the linuxarm64 URL) -- the exact libraries a local Raspberry Pi
      # build uses, so the released aarch64 package behaves identically to a
      # local Pi build, including h264_v4l2m2m hardware decode. This job is
      # where the broken v1.0.0 Pi artifact came from: it bundled a stale
      # cached libavcodec whose v4l2m2m decoder stalls on bcm2835-codec.

      - name: Setup Compiler Cache (ccache)
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: linux-aarch64-ccache-release

      - name: Configure CMake
        env:
          CC: "ccache aarch64-linux-gnu-gcc"
          CXX: "ccache aarch64-linux-gnu-g++"
          PKG_CONFIG_PATH: "/usr/lib/aarch64-linux-gnu/pkgconfig"
        run: |
          cmake -B build-linux-aarch64 \
            -DPLATFORM=LINUX \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DTREAT_WARNINGS_AS_ERRORS=ON \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build-linux-aarch64 --config Release -j$(nproc)

      - name: Package
        run: |
          PKG=NaikAVPlayer-${{ github.ref_name }}-linux-aarch64
          mkdir -p $PKG/lib
          cp build-linux-aarch64/NaikAVPlayer $PKG/
          find build-linux-aarch64 -name "libSDL3.so*" -exec cp -P {} $PKG/lib/ \;
          if [ -d thirdparty/ffmpeg/lib ]; then
            cp -P thirdparty/ffmpeg/lib/libav*.so* thirdparty/ffmpeg/lib/libsw*.so* $PKG/lib/
          fi
          cp -r assets $PKG/
          rm -f $PKG/assets/hd_test_video_with_audio.mp4 $PKG/assets/screenshot.png
          cp -r licenses $PKG/
          cp LICENSE README.md $PKG/
          tar czf $PKG.tar.gz $PKG

      - name: Verify shared library resolution
        run: |
          PKG=NaikAVPlayer-${{ github.ref_name }}-linux-aarch64
          ls -la $PKG/lib/
          aarch64-linux-gnu-readelf -d $PKG/NaikAVPlayer | grep -E "NEEDED|RUNPATH" || true

      - uses: actions/upload-artifact@v4
        with:
          name: linux-aarch64-package
          path: NaikAVPlayer-*.tar.gz

  publish:
    name: Create GitHub Release
    needs: [build-windows, build-linux, build-linux-aarch64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            NaikAVPlayer-*.zip
            NaikAVPlayer-*.tar.gz
          generate_release_notes: true
          body: |
            ## Downloads
            - **Windows (x64):** self-contained — extract and run `NaikAVPlayer.exe`. All FFmpeg/SDL3/runtime DLLs are bundled.
            - **Linux (x64):** self-contained — extract and run `NaikAVPlayer`. All FFmpeg/SDL3 shared libraries are bundled.
            - **Linux (aarch64):** self-contained — extract and run `NaikAVPlayer`. All FFmpeg/SDL3 shared libraries are bundled.