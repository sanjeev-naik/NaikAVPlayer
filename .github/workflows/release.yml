name: Release

on:
  push:
    tags: [ "v*" ]

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows Package (MinGW cross-compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cross-Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 ffmpeg

      - name: Configure & Build
        run: |
          cmake -B build-windows \
            -DPLATFORM=WINDOWS \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc \
            -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++ \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build-windows --config Release -j$(nproc)

      - name: Package
        run: |
          PKG=NaikAVPlayer-${{ github.ref_name }}-windows-x64
          mkdir -p $PKG
          cp build-windows/NaikAVPlayer.exe build-windows/*.dll $PKG/
          # MinGW runtime: winpthread is not covered by -static-libgcc/-static-libstdc++
          find /usr/x86_64-w64-mingw32 /usr/lib/gcc/x86_64-w64-mingw32 \
            -name "libwinpthread-1.dll" -exec cp {} $PKG/ \; 2>/dev/null || true
          cp -r assets $PKG/
          rm -f $PKG/assets/hd_test_video_with_audio.mp4 $PKG/assets/screenshot.png
          cp -r licenses $PKG/
          cp LICENSE README.md $PKG/
          zip -r $PKG.zip $PKG


      - name: Verify DLL closure
        run: |
          PKG=NaikAVPlayer-${{ github.ref_name }}-windows-x64
          missing=0
          for dll in $(x86_64-w64-mingw32-objdump -p $PKG/NaikAVPlayer.exe | awk '/DLL Name/{print $3}'); do
            case "$dll" in
              KERNEL32.dll|USER32.dll|GDI32.dll|SHELL32.dll|ADVAPI32.dll|ole32.dll|OLEAUT32.dll|msvcrt.dll|WS2_32.dll|bcrypt.dll|IMM32.dll|SETUPAPI.dll|VERSION.dll|WINMM.dll|uuid.dll|comdlg32.dll|SHLWAPI.dll|dwmapi.dll|CRYPT32.dll|Secur32.dll)
                ;;
              *)
                if [ ! -f "$PKG/$dll" ]; then
                  echo "::error::Missing dependent DLL in package: $dll"
                  missing=1
                fi
                ;;
            esac
          done
          [ $missing -eq 0 ] && echo "All non-system DLL dependencies are bundled."
          exit $missing

      - uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: NaikAVPlayer-*.zip

  build-linux:
    name: Linux Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libavcodec-dev libavformat-dev \
            libavutil-dev libswscale-dev libswresample-dev libgtk-3-dev

      - name: Configure & Build
        run: |
          cmake -B build -DPLATFORM=LINUX -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j$(nproc)

      - name: Package
        run: |
          PKG=NaikAVPlayer-${{ github.ref_name }}-linux-x64
          mkdir -p $PKG/lib
          cp build/NaikAVPlayer $PKG/
          # Bundle the in-tree built SDL3 shared library; binary finds it via $ORIGIN/lib RPATH
          find build -name "libSDL3.so*" -exec cp -P {} $PKG/lib/ \;
          cp -r assets $PKG/
          rm -f $PKG/assets/hd_test_video_with_audio.mp4 $PKG/assets/screenshot.png
          cp -r licenses $PKG/
          cp LICENSE README.md $PKG/
          tar czf $PKG.tar.gz $PKG


      - name: Verify shared library resolution
        run: |
          PKG=NaikAVPlayer-${{ github.ref_name }}-linux-x64
          ls -la $PKG/lib/
          cd $PKG
          if ldd ./NaikAVPlayer | grep "not found"; then
            echo "::error::Unresolved shared libraries in packaged binary"
            exit 1
          fi
          ldd ./NaikAVPlayer | grep -E "libSDL3|libav" || true
          echo "All shared libraries resolve (FFmpeg via system packages, SDL3 bundled)."

      - uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: NaikAVPlayer-*.tar.gz

  build-linux-aarch64:
    name: Linux aarch64 Package (ARM64 Cross-Compilation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cross-Compiler and Dependencies
        run: |
          sudo dpkg --add-architecture arm64

          # Restrict existing amd64 list sources to [arch=amd64]
          if [ -f /etc/apt/sources.list ]; then
            sudo sed -i 's/deb http/deb [arch=amd64] http/g' /etc/apt/sources.list
            sudo sed -i 's/deb mirror/deb [arch=amd64] mirror/g' /etc/apt/sources.list
          fi
          if [ -d /etc/apt/sources.list.d ]; then
            find /etc/apt/sources.list.d/ -type f -name "*.list" -exec sudo sed -i 's/deb http/deb [arch=amd64] http/g' {} +
          fi

          # Restrict existing amd64 DEB822 sources to Architectures: amd64
          sudo python3 -c '
          import glob, os
          for p in glob.glob("/etc/apt/sources.list.d/*.sources"):
              with open(p, "r") as f:
                  content = f.read()
              blocks = content.split("\n\n")
              new_blocks = []
              modified = False
              for block in blocks:
                  if "Suites:" in block and "Architectures:" not in block:
                      lines = block.split("\n")
                      for i, line in enumerate(lines):
                          if line.startswith("Suites:"):
                              lines.insert(i, "Architectures: amd64")
                              modified = True
                              break
                      block = "\n".join(lines)
                  new_blocks.append(block)
              if modified:
                  with open(p, "w") as f:
                      f.write("\n\n".join(new_blocks))
          '

          # Add arm64 sources
          sudo tee /etc/apt/sources.list.d/arm64.list <<EOF
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ $(lsb_release -cs) main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ $(lsb_release -cs)-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ $(lsb_release -cs)-security main restricted universe multiverse
          EOF

          sudo apt-get update
          sudo apt-get install -y \
            g++-aarch64-linux-gnu \
            libavcodec-dev:arm64 \
            libavformat-dev:arm64 \
            libavutil-dev:arm64 \
            libswscale-dev:arm64 \
            libswresample-dev:arm64 \
            libgtk-3-dev:arm64 \
            ccache

      - name: Setup Compiler Cache (ccache)
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: linux-aarch64-ccache-release

      - name: Configure CMake
        env:
          CC: "ccache aarch64-linux-gnu-gcc"
          CXX: "ccache aarch64-linux-gnu-g++"
          PKG_CONFIG_PATH: "/usr/lib/aarch64-linux-gnu/pkgconfig"
        run: |
          cmake -B build-linux-aarch64 \
            -DPLATFORM=LINUX \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DTREAT_WARNINGS_AS_ERRORS=ON \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build-linux-aarch64 --config Release -j$(nproc)

      - name: Package
        run: |
          PKG=NaikAVPlayer-${{ github.ref_name }}-linux-aarch64
          mkdir -p $PKG/lib
          cp build-linux-aarch64/NaikAVPlayer $PKG/
          find build-linux-aarch64 -name "libSDL3.so*" -exec cp -P {} $PKG/lib/ \;
          cp -r assets $PKG/
          rm -f $PKG/assets/hd_test_video_with_audio.mp4 $PKG/assets/screenshot.png
          cp -r licenses $PKG/
          cp LICENSE README.md $PKG/
          tar czf $PKG.tar.gz $PKG

      - name: Verify shared library resolution
        run: |
          PKG=NaikAVPlayer-${{ github.ref_name }}-linux-aarch64
          ls -la $PKG/lib/
          aarch64-linux-gnu-readelf -d $PKG/NaikAVPlayer | grep -E "NEEDED|RUNPATH" || true

      - uses: actions/upload-artifact@v4
        with:
          name: linux-aarch64-package
          path: NaikAVPlayer-*.tar.gz

  publish:
    name: Create GitHub Release
    needs: [build-windows, build-linux, build-linux-aarch64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            NaikAVPlayer-*.zip
            NaikAVPlayer-*.tar.gz
          generate_release_notes: true
          body: |
            ## Downloads
            - **Windows (x64):** self-contained — extract and run `NaikAVPlayer.exe`. All FFmpeg/SDL3/runtime DLLs are bundled.
            - **Linux (x64):** SDL3 is bundled; FFmpeg libraries must be installed from your distribution, e.g. Ubuntu/Debian: `sudo apt install libavcodec-dev libavformat-dev libswscale-dev libswresample-dev` or the `ffmpeg` package.
            - **Linux (aarch64):** SDL3 is bundled; FFmpeg libraries must be installed from your distribution, e.g., Debian/Ubuntu/Raspberry Pi OS: `sudo apt install libavcodec-dev libavformat-dev libswscale-dev libswresample-dev` or the `ffmpeg` package.